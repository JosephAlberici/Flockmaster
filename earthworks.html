<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flockmaster Earthworks</title>
  <style>
    body {
      background-color: #b8b8b8;
      font-family: "Trebuchet MS", "Segoe UI", Verdana, sans-serif;
      margin: 0;
      color: #1f2a36;
    }

    .top-bar {
      background: #2c3e50;
      color: #f7f1e6;
      padding: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      box-sizing: border-box;
    }

    .top-bar-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .top-bar-link {
      color: #f7f1e6;
      text-decoration: none;
      cursor: pointer;
    }

    .top-bar-tooltip {
      position: relative;
      display: inline-block;
      cursor: default;
    }

    .top-bar-tooltip-box {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #f7f1e6;
      color: #1f2a36;
      border: 2px solid black;
      border-radius: 10px;
      padding: 8px 12px;
      white-space: nowrap;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
      letter-spacing: 0;
    }

    .top-bar-tooltip:hover .top-bar-tooltip-box {
      visibility: visible;
      opacity: 1;
    }

    .page-title {
      color: #2c3e50;
      letter-spacing: 2px;
      margin: 28px 0 8px;
      text-align: center;
      text-shadow: 1px 1px 0 #d9d9d9;
    }

    .page-layout {
      display: flex;
      gap: 28px;
      padding: 24px 32px 40px;
      align-items: flex-start;
      box-sizing: border-box;
    }

    .earthworks-sidebar {
      width: 40%;
    }

    .earthworks-panel {
      width: 60%;
      min-height: 420px;
      background: #8b6a4f;
      border: 3px solid #2c3e50;
      border-radius: 18px;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      background: #f7f1e6;
      border: 2px solid black;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 22px;
      box-sizing: border-box;
    }

    .card h2 {
      margin-top: 0;
      color: #2c3e50;
    }

    .menu-button {
      display: inline-block;
      background: #2c3e50;
      color: #f7f1e6;
      text-decoration: none;
      padding: 12px 18px;
      border: 2px solid black;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 12px;
      margin-bottom: 12px;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 16px;
    }

    .menu-button.is-locked {
      background: #6f7780;
      color: #d7dde4;
      cursor: default;
      pointer-events: none;
    }

    .panel-header {
      margin-top: 0;
      color: #17311e;
      letter-spacing: 1px;
    }

    .panel-note {
      font-size: 18px;
      color: #17311e;
      margin: 0;
    }

    .locked-note {
      font-size: 18px;
      color: #f7f1e6;
      margin: 0;
    }

    .log-shell {
      position: relative;
      margin-top: 24px;
      text-align: center;
    }

    .log-button {
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
    }

    .log-button img {
      width: 100%;
      max-width: 760px;
      display: block;
      margin: 0 auto;
    }

    .grub-float {
      position: fixed;
      color: #f7f1e6;
      font-weight: bold;
      text-shadow: 1px 1px 0 black;
      pointer-events: none;
      animation: grub-pop 0.7s ease-out forwards;
      z-index: 300;
    }

    @keyframes grub-pop {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -95px);
      }
    }
  </style>
</head>

<body>
  <div class="top-bar" id="topBar"></div>

  <h1 class="page-title">EARTHWORKS</h1>

  <div class="page-layout">
    <div class="earthworks-sidebar">
      <div class="card">
        <a class="menu-button" href="aviary.html">Return To Aviary</a>
        <a class="menu-button" href="birdCatching.html">Bird Catching</a>
      </div>

      <div class="card">
        <h2>Earthworks Overview</h2>
        <p class="panel-note">Grubs Per Click: <span id="grubsPerClick"></span></p>
        <p class="panel-note">Grubs Per Second: <span id="grubsPerSecond"></span></p>
      </div>

      <div class="card">
        <h2>Materials</h2>
      </div>
    </div>

    <div class="earthworks-panel">
      <h2 class="panel-header">Grub Digging</h2>
      <p class="panel-note">Click the log to hunt grubs.</p>
      <div class="log-shell" id="logShell">
        <button class="log-button" type="button" id="logButton">
          <img src="/Resources/Misc%20Images/log.png" alt="Log for grub hunting">
        </button>
      </div>
    </div>
  </div>

  <script src="birds.js"></script>
  <script src="abilities.js"></script>
  <script src="game.js"></script>
  <script>
    // Cache page state and the main UI elements this screen updates.
    const gameState = loadGameState();
    const topBar = document.querySelector("#topBar");
    const panelHeader = document.querySelector(".panel-header");
    const panelNote = document.querySelector(".panel-note");
    const grubsPerClickDisplay = document.querySelector("#grubsPerClick");
    const grubsPerSecondDisplay = document.querySelector("#grubsPerSecond");
    const logButton = document.querySelector("#logButton");
    const logShell = document.querySelector("#logShell");
    const grubSplatSound = new Audio("/Resources/Sound%20Effects/grubsplat.mp3");

    function renderEarthworksOverview() {
      grubsPerClickDisplay.textContent = "+" + gameState.grubsPerClick;
      grubsPerSecondDisplay.textContent = "+" + getGrubsPerSecond(gameState).toFixed(2);
    }

    function spawnGrubFloat(x, y, amount) {
      const grubFloat = document.createElement("div");
      grubFloat.className = "grub-float";
      grubFloat.textContent = "+" + amount;
      grubFloat.style.left = x + "px";
      grubFloat.style.top = y + "px";
      document.body.appendChild(grubFloat);

      setTimeout(function () {
        grubFloat.remove();
      }, 700);
    }

    // Keep the shared top bar current while this page is open.
    updateCoinsFromElapsedTime(gameState, Date.now());
    renderTopBar(topBar, gameState);
    initButtonAudio();
    renderEarthworksOverview();
    startIncomeSystem(gameState, function () {
      renderTopBar(topBar, gameState);
    });

    if (!isEarthworksUnlocked(gameState)) {
      panelHeader.textContent = "Earthworks Locked";
      panelNote.className = "locked-note";
      panelNote.textContent = "Unlock Earthworks by reaching 4 species in your aviary.";
      logShell.style.display = "none";
    } else {
      logButton.addEventListener("click", function (event) {
        gameState.grubs += gameState.grubsPerClick;
        saveGameState(gameState);
        renderTopBar(topBar, gameState);
        renderEarthworksOverview();
        grubSplatSound.currentTime = 0;
        grubSplatSound.play();
        spawnGrubFloat(event.clientX, event.clientY, gameState.grubsPerClick);
      });
    }
  </script>
</body>
</html>
