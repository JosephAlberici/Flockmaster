<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flockmaster Settings</title>
  <style>
    body {
      background-color: #b8b8b8;
      font-family: "Trebuchet MS", "Segoe UI", Verdana, sans-serif;
      margin: 0;
      color: #1f2a36;
    }

    .top-bar {
      background: #2c3e50;
      color: #f7f1e6;
      padding: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      box-sizing: border-box;
    }

    .top-bar-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .top-bar-link {
      color: #f7f1e6;
      text-decoration: none;
      cursor: pointer;
    }

    .top-bar-tooltip {
      position: relative;
      display: inline-block;
      cursor: default;
    }

    .top-bar-tooltip-box {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #f7f1e6;
      color: #1f2a36;
      border: 2px solid black;
      border-radius: 10px;
      padding: 8px 12px;
      white-space: nowrap;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
      letter-spacing: 0;
    }

    .top-bar-tooltip:hover .top-bar-tooltip-box {
      visibility: visible;
      opacity: 1;
    }

    .settings-shell {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 24px;
      box-sizing: border-box;
    }

    .settings-card {
      background: #f7f1e6;
      border: 2px solid black;
      border-radius: 18px;
      padding: 24px;
    }

    .page-title {
      color: #2c3e50;
      margin-top: 0;
      letter-spacing: 2px;
      text-shadow: 1px 1px 0 #d9d9d9;
    }

    .back-link {
      display: inline-block;
      background: #2c3e50;
      color: #f7f1e6;
      text-decoration: none;
      padding: 12px 18px;
      border: 2px solid black;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .settings-actions {
      margin-top: 24px;
    }

    .settings-actions button,
    .settings-actions a {
      margin-right: 12px;
      margin-bottom: 12px;
    }

    .danger-button {
      display: inline-block;
      background: #8a2d2d;
      color: #f7f1e6;
      text-decoration: none;
      padding: 12px 18px;
      border: 2px solid black;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      font-size: 16px;
    }

    .action-button {
      display: inline-block;
      background: #2c3e50;
      color: #f7f1e6;
      text-decoration: none;
      padding: 12px 18px;
      border: 2px solid black;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      font-size: 16px;
    }

    .confirm-box {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid #b9b2a8;
      display: none;
    }

    .confirm-box.is-visible {
      display: block;
    }

    .confirm-text {
      margin: 0 0 16px;
      color: #2c3e50;
      font-weight: bold;
    }

    .code-shell {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid #b9b2a8;
    }

    .code-label {
      margin: 0 0 12px;
      color: #2c3e50;
      font-weight: bold;
    }

    .code-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .code-input {
      min-width: 240px;
      padding: 12px;
      border: 2px solid black;
      border-radius: 10px;
      font-family: inherit;
      font-size: 16px;
      box-sizing: border-box;
    }

    .code-result {
      margin: 14px 0 0;
      color: #2c3e50;
      font-weight: bold;
      min-height: 24px;
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: #8a2d2d;
      color: #f7f1e6;
      border: 2px solid black;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: bold;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease;
      z-index: 200;
    }

    .toast.is-visible {
      opacity: 1;
      visibility: visible;
    }
  </style>
</head>

<body>
  <div class="top-bar" id="topBar"></div>

  <div class="settings-shell">
    <div class="settings-card">
      <h1 class="page-title">SETTINGS</h1>
      <a class="back-link" href="index.html">Back To Home</a>

      <div class="settings-actions">
        <button class="action-button" type="button" id="exportSaveButton">Export Save</button>
        <button class="action-button" type="button" id="importSaveButton">Import Save</button>
        <button class="danger-button" type="button" id="eraseProgressButton">Erase Progress</button>
      </div>

      <div class="code-shell">
        <p class="code-label">Redeem Code</p>
        <div class="code-row">
          <input class="code-input" type="text" id="codeInput" placeholder="Enter code">
          <button class="action-button" type="button" id="redeemCodeButton" data-requires-success="true">Redeem</button>
        </div>
        <p class="code-result" id="codeResult"></p>
      </div>

      <input type="file" id="importSaveInput" accept=".txt" style="display: none;">

      <div class="confirm-box" id="eraseConfirmBox">
        <p class="confirm-text">Are you sure? This will permanently erase your current save</p>
        <button class="danger-button" type="button" id="confirmEraseButton">Yes, Erase Save</button>
        <button class="back-link" type="button" id="cancelEraseButton">Cancel</button>
      </div>
    </div>
  </div>

  <div class="toast" id="codeToast">Code already redeemed</div>

  <script src="birds.js"></script>
  <script src="abilities.js"></script>
  <script src="game.js"></script>
  <script>
    // Cache page state and the settings controls used on this screen.
    const gameState = loadGameState();
    const topBar = document.querySelector("#topBar");
    const exportSaveButton = document.querySelector("#exportSaveButton");
    const importSaveButton = document.querySelector("#importSaveButton");
    const importSaveInput = document.querySelector("#importSaveInput");
    const eraseProgressButton = document.querySelector("#eraseProgressButton");
    const eraseConfirmBox = document.querySelector("#eraseConfirmBox");
    const confirmEraseButton = document.querySelector("#confirmEraseButton");
    const cancelEraseButton = document.querySelector("#cancelEraseButton");
    const codeInput = document.querySelector("#codeInput");
    const redeemCodeButton = document.querySelector("#redeemCodeButton");
    const codeResult = document.querySelector("#codeResult");
    const codeToast = document.querySelector("#codeToast");
    let toastTimeoutId = null;

    // Keep the shared top bar current while this page is open.
    updateCoinsFromElapsedTime(gameState, Date.now());
    renderTopBar(topBar, gameState);
    initButtonAudio();
    startIncomeSystem(gameState, function () {
      renderTopBar(topBar, gameState);
    });

    exportSaveButton.addEventListener("click", function () {
      updateCoinsFromElapsedTime(gameState, Date.now());

      const saveText = JSON.stringify(gameState, null, 2);
      const saveBlob = new Blob([saveText], { type: "text/plain" });
      const downloadUrl = URL.createObjectURL(saveBlob);
      const downloadLink = document.createElement("a");

      downloadLink.href = downloadUrl;
      downloadLink.download = "flockmaster_save.txt";
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
      URL.revokeObjectURL(downloadUrl);
    });

    importSaveButton.addEventListener("click", function () {
      importSaveInput.click();
    });

    importSaveInput.addEventListener("change", async function () {
      const selectedFile = importSaveInput.files[0];

      if (!selectedFile) {
        return;
      }

      try {
        const fileText = await selectedFile.text();
        importGameProgress(fileText);
        window.location.reload();
      } catch (error) {
        alert("That save file could not be imported");
      } finally {
        importSaveInput.value = "";
      }
    });

    eraseProgressButton.addEventListener("click", function () {
      eraseConfirmBox.classList.add("is-visible");
    });

    cancelEraseButton.addEventListener("click", function () {
      eraseConfirmBox.classList.remove("is-visible");
    });

    confirmEraseButton.addEventListener("click", function () {
      eraseGameProgress();
      window.location.reload();
    });

    function showCodeToast(message) {
      codeToast.textContent = message;
      codeToast.classList.add("is-visible");

      if (toastTimeoutId !== null) {
        clearTimeout(toastTimeoutId);
      }

      toastTimeoutId = setTimeout(function () {
        codeToast.classList.remove("is-visible");
      }, 2200);
    }

    redeemCodeButton.addEventListener("click", function () {
      const submittedCode = codeInput.value.trim().toLowerCase();

      if (!submittedCode) {
        codeResult.textContent = "Enter a code first";
        return;
      }

      if (gameState.redeemedCodes.includes(submittedCode)) {
        showCodeToast("Code already redeemed");
        return;
      }

      if (submittedCode === "patchreset1") {
        gameState.trapLoadCost = 20;
        gameState.appleTrees = getTreeMaxCount(gameState, "appleTrees");
        gameState.pearTrees = getTreeMaxCount(gameState, "pearTrees");
        gameState.peachTrees = getTreeMaxCount(gameState, "peachTrees");
        gameState.redeemedCodes.push(submittedCode);
        playButtonSound();
        saveGameState(gameState);
        renderTopBar(topBar, gameState);
        codeResult.textContent = "Code redeemed: trap cost reset and tree counts restored to max";
        codeInput.value = "";
        return;
      }

      if (submittedCode === "patchcoin1") {
        gameState.coins += 100000;
        gameState.coinMax = Math.max(gameState.coinMax, gameState.coins);
        gameState.redeemedCodes.push(submittedCode);
        playButtonSound();
        saveGameState(gameState);
        renderTopBar(topBar, gameState);
        codeResult.textContent = "Code redeemed: 100k coins added";
        codeInput.value = "";
        return;
      }

      // Temporarily disabled patch code kept in place for later reactivation.
      if (false && submittedCode === "screechtest") {
        const screechOwlInFlock = gameState.birds.find(function (bird) {
          return bird.id === "screechowl";
        });

        if (!screechOwlInFlock) {
          codeResult.textContent = "Eastern Screech Owl data could not be found";
          return;
        }

        addBirdToFlock(screechOwlInFlock);
        gameState.redeemedCodes.push(submittedCode);
        playButtonSound();
        saveGameState(gameState);
        renderTopBar(topBar, gameState);
        codeResult.textContent = "Code redeemed: Eastern Screech Owl joined your flock";
        codeInput.value = "";
        return;
      }

      if (false && submittedCode === "valentinesday") {
        const cardinalInFlock = gameState.birds.find(function (bird) {
          return bird.id === "cardinal";
        });

        if (!cardinalInFlock) {
          codeResult.textContent = "Cardinal data could not be found";
          return;
        }

        cardinalInFlock.acquired = true;
        cardinalInFlock.count = Math.max(cardinalInFlock.count, 0) + 2;
        cardinalInFlock.variantCounts = {
          male: (cardinalInFlock.variantCounts && cardinalInFlock.variantCounts.male) || 0,
          female: (cardinalInFlock.variantCounts && cardinalInFlock.variantCounts.female) || 0
        };
        cardinalInFlock.variantCounts.male += 1;
        cardinalInFlock.variantCounts.female += 1;
        gameState.redeemedCodes.push(submittedCode);
        playButtonSound();
        saveGameState(gameState);
        renderTopBar(topBar, gameState);
        codeResult.textContent = "Code redeemed: a male and female Northern Cardinal joined your flock";
        codeInput.value = "";
        return;
      }

      if (submittedCode === "legacybirds") {
        const repairReport = repairLegacyBirdProgress(gameState);
        gameState.redeemedCodes.push(submittedCode);
        playButtonSound();
        saveGameState(gameState);
        renderTopBar(topBar, gameState);

        if (repairReport.didChange) {
          codeResult.textContent =
            "Code redeemed: legacy bird data repaired, Total individuals: " +
            repairReport.totalIndividuals +
            ", Common individuals: " +
            repairReport.commonIndividuals;
        } else {
          codeResult.textContent =
            "Code redeemed: no bird-count discrepancy found, Total individuals: " +
            repairReport.totalIndividuals +
            ", Common individuals: " +
            repairReport.commonIndividuals;
        }

        codeInput.value = "";
        return;
      }

      codeResult.textContent = "That code is not valid";
    });
  </script>
</body>
</html>
