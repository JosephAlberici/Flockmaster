<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flockmaster Compendium</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --action-panel-bg: #f7f1e6;
      --panel-heading: #2c3e50;
    }

    body {
      background-color: #b8b8b8;
      font-family: "Trebuchet MS", "Segoe UI", Verdana, sans-serif;
      margin: 0;
      color: #1f2a36;
    }

    .top-bar {
      background: #2c3e50;
      color: #f7f1e6;
      padding: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      box-sizing: border-box;
    }

    .top-bar-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .top-bar-link {
      color: #f7f1e6;
      text-decoration: none;
      cursor: pointer;
    }

    .top-bar-tooltip {
      position: relative;
      display: inline-block;
      cursor: default;
    }

    .top-bar-tooltip-box {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #f7f1e6;
      color: #1f2a36;
      border: 2px solid black;
      border-radius: 10px;
      padding: 8px 12px;
      white-space: nowrap;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
      letter-spacing: 0;
    }

    .top-bar-tooltip:hover .top-bar-tooltip-box {
      visibility: visible;
      opacity: 1;
    }

    .page-title {
      color: #2c3e50;
      letter-spacing: 2px;
      margin: 28px 0 8px;
      text-align: center;
      text-shadow: 1px 1px 0 #d9d9d9;
    }

    .page-layout {
      display: flex;
      gap: 28px;
      padding: 24px 32px 40px;
      align-items: flex-start;
      box-sizing: border-box;
    }

    .compendium-sidebar {
      width: 32%;
    }

    .compendium-panel {
      width: 68%;
      min-height: 720px;
    }

    .card {
      background: #f7f1e6;
      border: 2px solid black;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 22px;
      min-height: 120px;
      box-sizing: border-box;
    }

    .menu-button {
      display: inline-block;
      background: #2c3e50;
      color: #f7f1e6;
      text-decoration: none;
      padding: 12px 18px;
      border: 2px solid black;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 12px;
      margin-bottom: 12px;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 16px;
    }

    .panel-header {
      margin-top: 0;
      color: #2c3e50;
      letter-spacing: 1px;
    }

    .rarity-uncommon {
      color: #2f8f46;
      font-weight: bold;
    }

    .rarity-rare {
      color: #2f6fd4;
      font-weight: bold;
    }

    .rarity-epic {
      color: #7d46c7;
      font-weight: bold;
    }

    .rarity-legendary {
      color: #d4b55a;
      font-weight: bold;
    }

    .compendium-controls {
      margin-bottom: 18px;
    }

    .compendium-entry {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #b9b2a8;
    }

    .compendium-entry:first-of-type {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .compendium-entry h3 {
      margin: 0 0 10px;
      color: #2c3e50;
    }

    .compendium-entry p {
      margin: 0;
      font-size: 18px;
    }

    .compendium-note {
      margin: 0;
      font-size: 18px;
    }

    .compendium-bestiary-image {
      display: block;
      width: 100%;
      max-width: 220px;
      max-width: 100%;
      margin: 12px 0;
      transform: scale(var(--bestiary-image-scale, 1));
      transform-origin: bottom center;
    }

    .compendium-bestiary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 240px));
      gap: 20px;
      align-items: start;
      justify-content: start;
    }

    .compendium-bestiary-grid .compendium-entry {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .compendium-bestiary-entry {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .compendium-bestiary-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .compendium-bestiary-image-wrap {
      width: 100%;
      min-height: 250px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      margin-bottom: 12px;
      overflow: visible;
    }

    .compendium-bestiary-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .compendium-toggle-button {
      display: inline-block;
      background: #2c3e50;
      color: #f7f1e6;
      border: 2px solid black;
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
    }

    .compendium-tooltip {
      position: relative;
      display: inline-block;
    }

    .compendium-tooltip-trigger {
      display: inline-block;
      background: #2c3e50;
      color: #f7f1e6;
      border: 2px solid black;
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
    }

    .compendium-tooltip-box {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      background: #f7f1e6;
      color: #1f2a36;
      border: 2px solid black;
      border-radius: 10px;
      padding: 10px 12px;
      min-width: 220px;
      white-space: normal;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
    }

    .compendium-tooltip.is-open .compendium-tooltip-box {
      visibility: visible;
      opacity: 1;
    }

    .compendium-tooltip-box p + p {
      margin-top: 8px;
    }

    .compendium-pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .compendium-page-button {
      display: none;
      background: #2c3e50;
      color: #f7f1e6;
      border: 2px solid black;
      border-radius: 10px;
      padding: 8px 14px;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
    }

    .compendium-page-button.is-visible {
      display: inline-block;
    }

    .compendium-page-button.is-active {
      background: #17311e;
    }

    .compendium-abilities-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px 20px;
      align-items: start;
    }

    .compendium-abilities-grid .compendium-entry {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }
  </style>
</head>

<body>
  <div class="top-bar" id="topBar"></div>

  <h1 class="page-title">COMPENDIUM</h1>

  <div class="page-layout">
    <div class="compendium-sidebar">
      <div class="card">
        <a class="menu-button" href="index.html">Home</a>
        <a class="menu-button" href="aviary.html">Aviary</a>
      </div>
      <div class="card"></div>
      <div class="card"></div>
    </div>

      <div class="compendium-panel action-panel">
      <h2 class="panel-header">Compendium</h2>
      <div class="compendium-controls">
        <button class="menu-button" type="button" id="bestiaryButton">Bestiary</button>
        <button class="menu-button" type="button" id="abilityDescriptionsButton">Ability Descriptions</button>
      </div>
      <div id="compendiumContent"></div>
    </div>
  </div>

  <script src="birds.js"></script>
  <script src="abilities.js"></script>
  <script src="upgrades.js"></script>
  <script src="items.js"></script>
  <script src="game.js"></script>
  <script>
    // Load the save and keep the shared top bar current on this page.
    const gameState = loadGameState();
    const topBar = document.querySelector("#topBar");
    const bestiaryButton = document.querySelector("#bestiaryButton");
    const abilityDescriptionsButton = document.querySelector("#abilityDescriptionsButton");
    const compendiumContent = document.querySelector("#compendiumContent");
    const compendiumPanel = document.querySelector(".compendium-panel");
    let activeCompendiumTab = "bestiary";
    let bestiaryPage = 1;
    let abilitiesPage = 1;

    // Keep the whole page in sync when passive resources update in the background.
    // Highlight whichever Compendium tab is currently selected.
    function setActiveCompendiumTab() {
      bestiaryButton.classList.toggle("is-active", activeCompendiumTab === "bestiary");
      abilityDescriptionsButton.classList.toggle("is-active", activeCompendiumTab === "abilities");
    }

    // Render page buttons only when more than one page exists.
    function appendPagination(container, totalPages, currentPage, onPageChange) {
      if (totalPages <= 1) {
        return;
      }

      const pagination = document.createElement("div");
      pagination.className = "compendium-pagination";

      for (let pageNumber = 1; pageNumber <= totalPages; pageNumber += 1) {
        const pageButton = document.createElement("button");
        pageButton.className = "compendium-page-button is-visible";
        pageButton.type = "button";
        pageButton.textContent = "Page " + pageNumber;
        pageButton.classList.toggle("is-active", pageNumber === currentPage);
        pageButton.addEventListener("click", function () {
          onPageChange(pageNumber);
        });
        pagination.appendChild(pageButton);
      }

      container.appendChild(pagination);
    }

    // Build one bestiary card so measurement and rendering stay in sync.
    function createBestiaryEntry(bird) {
      const birdEntry = document.createElement("div");
      birdEntry.className = "compendium-entry compendium-bestiary-entry";
      const birdAbilityNames = getBirdAbilityNames(bird);
      const baseBestiaryScale = typeof bird.habitatScale === "number" ? bird.habitatScale : 1;
      const metaBlock = document.createElement("div");
      metaBlock.className = "compendium-bestiary-meta";
      const actionRow = document.createElement("div");
      actionRow.className = "compendium-bestiary-actions";

      const birdName = document.createElement("h3");
      birdName.textContent = bird.species;
      birdEntry.appendChild(birdName);

      const habitatLine = document.createElement("p");
      habitatLine.textContent = "Native Habitat: " + bird.nativeHabitat;
      metaBlock.appendChild(habitatLine);

      const scientificNameLine = document.createElement("p");
      scientificNameLine.textContent = "Scientific Name: " + bird.scientificName;
      metaBlock.appendChild(scientificNameLine);

      const rarityLine = document.createElement("p");
      const rarityClassName = getRarityClassName(bird.rarity);
      rarityLine.innerHTML = "Rarity: <span class='" + rarityClassName + "'>" + bird.rarity + "</span>";
      metaBlock.appendChild(rarityLine);

      const dietLine = document.createElement("p");
      dietLine.textContent = "Diet: " + formatBirdDietLabel(bird);
      metaBlock.appendChild(dietLine);

      const abilityLine = document.createElement("p");
      abilityLine.textContent = "Ability: " + (birdAbilityNames.length > 0 ? birdAbilityNames.join(", ") : "None");
      metaBlock.appendChild(abilityLine);

      birdEntry.appendChild(metaBlock);

      const imageWrap = document.createElement("div");
      imageWrap.className = "compendium-bestiary-image-wrap";

      if (bird.variantImages) {
        const variantKeys = Object.keys(bird.variantImages);
        let activeVariantIndex = 0;

        const toggleButton = document.createElement("button");
        toggleButton.className = "compendium-toggle-button";
        toggleButton.type = "button";
        toggleButton.textContent = "Toggle Sex";
        actionRow.appendChild(toggleButton);

        const bestiaryImage = document.createElement("img");
        bestiaryImage.className = "compendium-bestiary-image";
        bestiaryImage.src = bird.variantImages[variantKeys[activeVariantIndex]];
        bestiaryImage.alt = bird.species + " (" + variantKeys[activeVariantIndex] + ")";
        const currentVariantKey = variantKeys[activeVariantIndex];
        const variantScaleMultiplier =
          bird.habitatVariantScales &&
          typeof bird.habitatVariantScales[currentVariantKey] === "number"
            ? bird.habitatVariantScales[currentVariantKey]
            : 1;
        bestiaryImage.style.setProperty("--bestiary-image-scale", baseBestiaryScale * variantScaleMultiplier);
        imageWrap.appendChild(bestiaryImage);

        toggleButton.addEventListener("click", function () {
          activeVariantIndex = (activeVariantIndex + 1) % variantKeys.length;
          bestiaryImage.src = bird.variantImages[variantKeys[activeVariantIndex]];
          bestiaryImage.alt = bird.species + " (" + variantKeys[activeVariantIndex] + ")";
          const toggledVariantKey = variantKeys[activeVariantIndex];
          const toggledVariantScaleMultiplier =
            bird.habitatVariantScales &&
            typeof bird.habitatVariantScales[toggledVariantKey] === "number"
              ? bird.habitatVariantScales[toggledVariantKey]
              : 1;
          bestiaryImage.style.setProperty("--bestiary-image-scale", baseBestiaryScale * toggledVariantScaleMultiplier);
        });
      } else {
        const bestiaryImage = document.createElement("img");
        bestiaryImage.className = "compendium-bestiary-image";
        bestiaryImage.src = getBirdPrimaryImage(bird);
        bestiaryImage.alt = bird.species;
        bestiaryImage.style.setProperty("--bestiary-image-scale", baseBestiaryScale);
        imageWrap.appendChild(bestiaryImage);
      }

      const baseStatsTooltip = document.createElement("div");
      baseStatsTooltip.className = "compendium-tooltip";
      baseStatsTooltip.innerHTML =
        "<button class='compendium-tooltip-trigger' type='button'>Base Stats</button>" +
        "<div class='compendium-tooltip-box'>" +
          getBirdResourceLinesHtml(bird, gameState, { baseValues: true }) +
        "</div>";
      const baseStatsTrigger = baseStatsTooltip.querySelector(".compendium-tooltip-trigger");
      baseStatsTrigger.addEventListener("click", function (event) {
        event.stopPropagation();
        document.querySelectorAll(".compendium-tooltip.is-open").forEach(function (openTooltip) {
          if (openTooltip !== baseStatsTooltip) {
            openTooltip.classList.remove("is-open");
          }
        });
        baseStatsTooltip.classList.toggle("is-open");
      });
      actionRow.appendChild(baseStatsTooltip);

      birdEntry.appendChild(actionRow);
      birdEntry.appendChild(imageWrap);

      return birdEntry;
    }

    // Split bestiary entries into pages using stable measured card sizing.
    function buildBestiaryPages(sortedBirds) {
      const pageWidth = compendiumContent.clientWidth || compendiumPanel.clientWidth || 800;
      const gap = 20;
      const cardWidth = 240;
      const columnCount = Math.max(1, Math.floor((pageWidth + gap) / (cardWidth + gap)));
      const availableHeight = Math.max(
        320,
        compendiumPanel.clientHeight - (compendiumContent.offsetTop - compendiumPanel.offsetTop) - 24
      );
      const measurementGrid = document.createElement("div");
      measurementGrid.className = "compendium-bestiary-grid";
      measurementGrid.style.position = "absolute";
      measurementGrid.style.left = "-9999px";
      measurementGrid.style.top = "0";
      measurementGrid.style.visibility = "hidden";
      measurementGrid.style.pointerEvents = "none";
      measurementGrid.style.width = pageWidth + "px";
      document.body.appendChild(measurementGrid);

      // Measure real rendered card heights once, then use the tallest card to
      // create stable page slices that do not shift around while paging back
      // and forth through the Bestiary.
      const measuredEntries = sortedBirds.map(function (bird) {
        const birdEntry = createBestiaryEntry(bird);
        measurementGrid.appendChild(birdEntry);
        return {
          bird: bird,
          height: birdEntry.offsetHeight
        };
      });

      document.body.removeChild(measurementGrid);
      const tallestEntryHeight = measuredEntries.reduce(function (maxHeight, entry) {
        return Math.max(maxHeight, entry.height);
      }, 0);
      const rowsPerPage = Math.max(1, Math.floor((availableHeight + gap) / (tallestEntryHeight + gap)));
      const entriesPerPage = Math.max(1, rowsPerPage * columnCount);
      const pages = [];

      // Chunk the sorted bird list into fixed pages so navigation remains
      // deterministic until the viewport size itself changes.
      for (let startIndex = 0; startIndex < sortedBirds.length; startIndex += entriesPerPage) {
        pages.push(sortedBirds.slice(startIndex, startIndex + entriesPerPage));
      }

      return pages.length > 0 ? pages : [sortedBirds];
    }

    // List every species in alphabetical order with its image and habitat.
    function renderBestiaryView() {
      const sortedBirds = [...BIRD_LIBRARY].sort(function (leftBird, rightBird) {
        return leftBird.species.localeCompare(rightBird.species);
      });
      const bestiaryPages = buildBestiaryPages(sortedBirds);
      const totalPages = bestiaryPages.length;
      bestiaryPage = Math.min(Math.max(1, bestiaryPage), totalPages);
      const visibleBirds = bestiaryPages[bestiaryPage - 1] || [];

      activeCompendiumTab = "bestiary";
      compendiumContent.innerHTML = "";
      setActiveCompendiumTab();

      const bestiaryGrid = document.createElement("div");
      bestiaryGrid.className = "compendium-bestiary-grid";

      visibleBirds.forEach(function (bird) {
        bestiaryGrid.appendChild(createBestiaryEntry(bird));
      });

      compendiumContent.appendChild(bestiaryGrid);
      appendPagination(compendiumContent, totalPages, bestiaryPage, function (newPage) {
        bestiaryPage = newPage;
        renderBestiaryView();
      });
    }

    // List every known ability in alphabetical order with its description and matching species.
    function renderAbilityDescriptionsView() {
      const sortedAbilities = Object.keys(ABILITIES)
        .map(function (abilityId) {
          return {
            id: abilityId,
            ...ABILITIES[abilityId]
          };
        })
        .sort(function (leftAbility, rightAbility) {
          return leftAbility.name.localeCompare(rightAbility.name);
        });
      const entriesPerPage = 30;
      const totalPages = Math.ceil(sortedAbilities.length / entriesPerPage);
      const startingIndex = (abilitiesPage - 1) * entriesPerPage;
      const visibleAbilities = sortedAbilities.slice(startingIndex, startingIndex + entriesPerPage);

      activeCompendiumTab = "abilities";
      compendiumContent.innerHTML = "";
      setActiveCompendiumTab();

      const abilitiesGrid = document.createElement("div");
      abilitiesGrid.className = "compendium-abilities-grid";

      visibleAbilities.forEach(function (ability) {
        const matchingSpecies = BIRD_LIBRARY
          .filter(function (bird) {
            return Array.isArray(bird.abilities) && bird.abilities.includes(ability.id);
          })
          .map(function (bird) {
            return bird.species;
          })
          .sort(function (leftSpecies, rightSpecies) {
            return leftSpecies.localeCompare(rightSpecies);
          });

        const abilityEntry = document.createElement("div");
        abilityEntry.className = "compendium-entry";
        abilityEntry.innerHTML =
          "<h3>" + ability.name + "</h3>" +
          "<p>" + ability.description + "</p>" +
          "<p><strong>Birds:</strong> " + (matchingSpecies.length > 0 ? matchingSpecies.join(", ") : "N/A") + "</p>";
        abilitiesGrid.appendChild(abilityEntry);
      });

      compendiumContent.appendChild(abilitiesGrid);
      appendPagination(compendiumContent, totalPages, abilitiesPage, function (newPage) {
        abilitiesPage = newPage;
        renderAbilityDescriptionsView();
      });
    }

    renderTopBar(topBar, gameState);
    initButtonAudio();
    initViewportAwareTooltips();
    startIncomeSystem(gameState, function () {
      renderTopBar(topBar, gameState);
    });
    renderBestiaryView();

    bestiaryButton.addEventListener("click", function () {
      bestiaryPage = 1;
      renderBestiaryView();
    });

    abilityDescriptionsButton.addEventListener("click", function () {
      abilitiesPage = 1;
      renderAbilityDescriptionsView();
    });

    document.addEventListener("click", function () {
      document.querySelectorAll(".compendium-tooltip.is-open").forEach(function (openTooltip) {
        openTooltip.classList.remove("is-open");
      });
    });

    window.addEventListener("resize", function () {
      if (activeCompendiumTab === "bestiary") {
        renderBestiaryView();
      }
    });
  </script>
</body>
</html>
