<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flockmaster Friends</title>
  <style>
    body {
      background-color: #b8b8b8;
      font-family: "Trebuchet MS", "Segoe UI", Verdana, sans-serif;
      margin: 0;
      color: #1f2a36;
    }

    .top-bar {
      background: #2c3e50;
      color: #f7f1e6;
      padding: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      box-sizing: border-box;
    }

    .top-bar-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .top-bar-link {
      color: #f7f1e6;
      text-decoration: none;
      cursor: pointer;
    }

    .top-bar-tooltip {
      position: relative;
      display: inline-block;
      cursor: default;
    }

    .top-bar-tooltip-box {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #f7f1e6;
      color: #1f2a36;
      border: 2px solid black;
      border-radius: 10px;
      padding: 8px 12px;
      white-space: nowrap;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
      letter-spacing: 0;
    }

    .top-bar-tooltip:hover .top-bar-tooltip-box {
      visibility: visible;
      opacity: 1;
    }

    .page-title {
      color: #2c3e50;
      letter-spacing: 2px;
      margin: 28px 0 8px;
      text-align: center;
      text-shadow: 1px 1px 0 #d9d9d9;
    }

    .page-layout {
      display: flex;
      gap: 28px;
      padding: 24px 32px 40px;
      align-items: flex-start;
      box-sizing: border-box;
    }

    .friends-sidebar {
      width: 40%;
    }

    .friends-panel {
      width: 60%;
      min-height: 420px;
      background: #f7f1e6;
      border: 3px solid #2c3e50;
      border-radius: 18px;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      background: #f7f1e6;
      border: 2px solid black;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 22px;
      min-height: 120px;
      box-sizing: border-box;
    }

    .card h2 {
      margin-top: 0;
      color: #2c3e50;
    }

    .menu-button {
      display: inline-block;
      background: #2c3e50;
      color: #f7f1e6;
      text-decoration: none;
      padding: 12px 18px;
      border: 2px solid black;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 12px;
      margin-bottom: 12px;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 16px;
    }

    .panel-header {
      margin-top: 0;
      color: #2c3e50;
      letter-spacing: 1px;
    }

    .panel-note {
      font-size: 18px;
      color: #2c3e50;
      margin: 0 0 12px;
    }
  </style>
</head>

<body>
  <div class="top-bar" id="topBar"></div>

  <h1 class="page-title">FRIENDS</h1>

  <div class="page-layout">
    <div class="friends-sidebar">
      <div class="card">
        <a class="menu-button" href="index.html">Back To Home</a>
        <a class="menu-button" href="aviary.html">Back To Aviary</a>
      </div>

      <div class="card"></div>

      <div class="card"></div>
    </div>

    <div class="friends-panel">
      <h2 class="panel-header">Leaderboard</h2>
      <p class="panel-note">Points: <span id="pointsDisplay"></span></p>
    </div>
  </div>

  <script src="birds.js"></script>
  <script src="abilities.js"></script>
  <script src="game.js"></script>
  <script>
    // Load the save and refresh the simple friends overview.
    const gameState = loadGameState();
    const topBar = document.querySelector("#topBar");
    const pointsDisplay = document.querySelector("#pointsDisplay");

    function renderFriendsPage() {
      pointsDisplay.textContent = formatLargeNumber(getPoints(gameState));
      renderTopBar(topBar, gameState);
    }

    updateCoinsFromElapsedTime(gameState, Date.now());
    initButtonAudio();
    renderFriendsPage();
    startIncomeSystem(gameState, function () {
      renderFriendsPage();
    });
  </script>
</body>
</html>
