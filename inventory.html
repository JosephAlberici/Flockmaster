<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flockmaster Inventory</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .page-layout {
      display: flex;
      gap: 28px;
      padding: 24px 32px 40px;
      align-items: flex-start;
      box-sizing: border-box;
    }

    .inventory-sidebar {
      width: 40%;
    }

    .inventory-main {
      width: 60%;
    }

    .nav-tooltip {
      position: relative;
      display: inline-block;
    }

    .nav-tooltip-box {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: #f7f1e6;
      color: #1f2a36;
      border: 2px solid black;
      border-radius: 10px;
      padding: 8px 12px;
      white-space: nowrap;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
    }

    .nav-tooltip:hover .nav-tooltip-box {
      visibility: visible;
      opacity: 1;
    }

    .resource-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .resource-section-title {
      margin: 0 0 12px;
      color: #17311e;
      font-size: 18px;
      letter-spacing: 0.5px;
    }

    .resource-line {
      margin: 0 0 10px;
      color: #2c3e50;
      font-weight: bold;
    }

    .resource-line:last-child {
      margin-bottom: 0;
    }

    .inventory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 220px));
      gap: 24px;
      align-items: flex-start;
      min-height: 360px;
      justify-content: start;
    }

    .inventory-empty {
      margin: 0;
      font-size: 18px;
      font-weight: bold;
      color: #2c3e50;
      grid-column: 1 / -1;
    }

    .inventory-item-figure {
      margin: 0;
      text-align: center;
      position: relative;
      width: 220px;
    }

    .inventory-item-visual {
      width: 220px;
      height: 220px;
      border: 2px dashed #7f8c8d;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #5f6f7f;
      font-weight: bold;
      cursor: pointer;
      box-sizing: border-box;
      overflow: hidden;
    }

    .inventory-item-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: pointer;
      display: block;
    }

    .inventory-item-tooltip {
      position: absolute;
      bottom: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%);
      background: #f7f1e6;
      color: #1f2a36;
      border: 2px solid black;
      border-radius: 10px;
      padding: 10px 14px;
      min-width: 200px;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
      text-align: left;
    }

    .inventory-item-figure:hover .inventory-item-tooltip,
    .inventory-item-figure.is-open .inventory-item-tooltip {
      visibility: visible;
      opacity: 1;
    }

    .inventory-item-tooltip p {
      margin: 0;
    }

    .inventory-item-count {
      margin: 12px 0 6px;
      font-weight: bold;
      color: #17311e;
    }

    .inventory-item-name {
      margin: 0;
      font-weight: bold;
      color: #2c3e50;
    }

    .inventory-item-action {
      margin-top: 10px;
    }

    .inventory-item-action .menu-button {
      margin: 0;
      padding: 8px 16px;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="top-bar" id="topBar"></div>

  <h1 class="page-title">INVENTORY</h1>

  <div class="page-layout">
    <div class="inventory-sidebar">
      <div class="card">
        <a class="menu-button" href="index.html">Home</a>
        <a class="menu-button" href="aviary.html">Aviary</a>
        <a class="menu-button" href="birdCatching.html">Bird Catching</a>
        <span class="nav-tooltip" id="earthworksNavWrapper"></span>
        <span class="nav-tooltip" id="dockyardNavWrapper"></span>
      </div>

      <div class="card">
        <h2>Resources</h2>
        <div class="resource-grid">
          <div>
            <h3 class="resource-section-title">Census</h3>
            <div id="censusResourceList"></div>
          </div>
          <div>
            <h3 class="resource-section-title">Materials</h3>
            <div id="materialResourceList"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="inventory-main">
      <div class="card">
        <h2>Items</h2>
        <div class="inventory-grid" id="inventoryGrid"></div>
      </div>
    </div>
  </div>

  <script src="birds.js"></script>
  <script src="abilities.js"></script>
  <script src="upgrades.js"></script>
  <script src="speciesUpgrades.js"></script>
  <script src="items.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="game.js"></script>
  <script>
    const gameState = loadGameState();
    initCloudSaveForCurrentPage(gameState, { reloadOnRemoteLoad: true });
    const topBar = document.querySelector("#topBar");
    const inventoryGrid = document.querySelector("#inventoryGrid");
    const censusResourceList = document.querySelector("#censusResourceList");
    const materialResourceList = document.querySelector("#materialResourceList");
    const earthworksNavWrapper = document.querySelector("#earthworksNavWrapper");
    const dockyardNavWrapper = document.querySelector("#dockyardNavWrapper");

    function renderEarthworksNav() {
      earthworksNavWrapper.innerHTML = "";

      if (isEarthworksUnlocked(gameState)) {
        earthworksNavWrapper.innerHTML = "<a class='menu-button' href='earthworks.html'>Earthworks</a>";
        return;
      }

      earthworksNavWrapper.innerHTML =
        "<span class='menu-button is-locked'>Earthworks</span>" +
        "<span class='nav-tooltip-box'>Unlock at 10 Individuals</span>";
    }

    function renderDockyardNav() {
      dockyardNavWrapper.innerHTML = "";

      if (isDockyardUnlocked(gameState)) {
        dockyardNavWrapper.innerHTML = "<a class='menu-button' href='dockyard.html'>Dockyard</a>";
        return;
      }

      dockyardNavWrapper.innerHTML =
        "<span class='menu-button is-locked'>Dockyard</span>" +
        "<span class='nav-tooltip-box'>Construct Urban Waters to Unlock</span>";
    }

    function renderResources() {
      const censusRows = [
        { label: "Species", value: formatLargeNumber(getFlockDiversity(gameState)) },
        { label: "Individuals", value: formatLargeNumber(getTotalBirdCount(gameState)) }
      ];

      const materialRows = [
        { label: "Seeds", value: formatSeeds(gameState.seeds) },
        { label: "Grubs", value: formatLargeNumber(gameState.grubs) },
        { label: "Feathers", value: formatLargeNumber(gameState.feathers) },
        { label: "Hardwood", value: formatLargeNumber(gameState.hardwood) },
        { label: "Mice", value: formatLargeNumber(gameState.mice) },
        { label: "Fish", value: formatLargeNumber(gameState.fish) },
        { label: "Scrap", value: formatLargeNumber(gameState.scrap) },
        { label: "Coins", value: formatCoins(gameState.coins) },
        { label: "Twigs", value: formatLargeNumber(gameState.twigs) }
      ];

      censusResourceList.innerHTML = censusRows.map(function (row) {
        return "<p class='resource-line'>" + row.label + ": " + row.value + "</p>";
      }).join("");

      materialResourceList.innerHTML = materialRows.map(function (row) {
        return "<p class='resource-line'>" + row.label + ": " + row.value + "</p>";
      }).join("");
    }

    // Rebuild the inventory grid only when item ownership actually changes.
    function renderInventory() {
      inventoryGrid.innerHTML = "";
      const visibleItems = getInventoryItems(gameState).filter(function (item) {
        return item.count > 0;
      });

      if (visibleItems.length === 0) {
        inventoryGrid.innerHTML = "<p class='inventory-empty'>No items collected yet</p>";
        return;
      }

      visibleItems.forEach(function (item) {
        const itemFigure = document.createElement("figure");
        itemFigure.className = "inventory-item-figure";

        const tooltipBox = document.createElement("div");
        tooltipBox.className = "inventory-item-tooltip";
        tooltipBox.innerHTML = "<p>" + item.description + "</p>";

        const itemVisual = document.createElement("div");
        itemVisual.className = "inventory-item-visual";
        itemVisual.tabIndex = 0;

        if (item.image) {
          const itemImage = document.createElement("img");
          itemImage.src = item.image;
          itemImage.alt = item.name;
          itemVisual.appendChild(itemImage);
        } else {
          itemVisual.textContent = "No Art Yet";
        }

        itemVisual.addEventListener("click", function (event) {
          event.stopPropagation();
          document.querySelectorAll(".inventory-item-figure.is-open").forEach(function (openFigure) {
            if (openFigure !== itemFigure) {
              openFigure.classList.remove("is-open");
            }
          });
          itemFigure.classList.toggle("is-open");
        });

        const countLine = document.createElement("p");
        countLine.className = "inventory-item-count";
        countLine.textContent = "x" + formatLargeNumber(item.count);

        const nameLine = document.createElement("p");
        nameLine.className = "inventory-item-name";
        nameLine.textContent = item.name;

        itemFigure.appendChild(tooltipBox);
        itemFigure.appendChild(itemVisual);
        itemFigure.appendChild(countLine);
        itemFigure.appendChild(nameLine);

        if (item.inventoryUsable) {
          const actionShell = document.createElement("div");
          actionShell.className = "inventory-item-action";

          const useButton = document.createElement("button");
          useButton.className = "menu-button";
          useButton.type = "button";
          useButton.dataset.requiresSuccess = "true";
          useButton.textContent = "Use";

          if (!canUseInventoryItem(gameState, item.id)) {
            useButton.classList.add("is-locked");
          }

          useButton.addEventListener("click", function (event) {
            event.stopPropagation();
            updateCoinsFromElapsedTime(gameState, Date.now());

            if (!useInventoryItem(gameState, item.id)) {
              return;
            }

            playButtonSound();
            saveGameState(gameState);
            renderTopBar(topBar, gameState);
            renderResources();
            renderInventory();
          });

          actionShell.appendChild(useButton);
          itemFigure.appendChild(actionShell);
        }

        inventoryGrid.appendChild(itemFigure);
      });
    }

    document.addEventListener("click", function () {
      document.querySelectorAll(".inventory-item-figure.is-open").forEach(function (openFigure) {
        openFigure.classList.remove("is-open");
      });
    });

    updateCoinsFromElapsedTime(gameState, Date.now());
    renderTopBar(topBar, gameState);
    initButtonAudio();
    initViewportAwareTooltips();
    startIncomeSystem(gameState, function () {
      renderTopBar(topBar, gameState);
      renderResources();
      renderInventory();
    });
    renderEarthworksNav();
    renderDockyardNav();
    renderResources();
    renderInventory();
  </script>
</body>
</html>
