<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flockmaster</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background-color: #b8b8b8;
      font-family: "Trebuchet MS", "Segoe UI", Verdana, sans-serif;
      text-align: center;
      margin: 0;
      color: #1f2a36;
    }

    .top-bar {
      background: #2c3e50;
      color: #f7f1e6;
      padding: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      box-sizing: border-box;
    }

    h1 {
      color: #2c3e50;
      margin-top: 32px;
      letter-spacing: 2px;
      text-shadow: 1px 1px 0 #d9d9d9;
    }

    .button {
      display: block;
      width: 220px;
      margin: 20px auto;
      padding: 15px 25px;
      background: #2c3e50;
      color: #f7f1e6;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid black;
      font-weight: bold;
      letter-spacing: 0.5px;
      text-decoration: none;
      box-sizing: border-box;
    }

    .home-bird {
      position: relative;
      margin-top: 140px;
    }

    .home-bird img {
      display: block;
      width: 38%;
      margin: 0 auto;
    }

    .speech-bubble {
      position: absolute;
      top: 50px;
      left: 54%;
      background: #f7f1e6;
      color: #2c3e50;
      padding: 14px 18px;
      border: 2px solid black;
      border-radius: 18px;
      min-width: 140px;
      max-width: 240px;
      text-align: center;
      font-weight: bold;
      box-sizing: border-box;
      visibility: hidden;
    }

    .speech-bubble::before {
      content: "";
      position: absolute;
      bottom: -18px;
      left: 24px;
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 18px solid black;
    }

    .speech-bubble::after {
      content: "";
      position: absolute;
      bottom: -14px;
      left: 26px;
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 14px solid #f7f1e6;
    }

  </style>
</head>

<body>

  <div class="top-bar" id="topBar"></div>

  <h1>FLOCKMASTER</h1>

  <a class="button" href="aviary.html">My Aviary</a>
  <a class="button" href="compendium.html">Compendium</a>
  <a class="button" href="friends.html">Friends</a>
  <a class="button" href="settings.html">Settings</a>

  <div class="home-bird">
    <div class="speech-bubble"></div>
    <img src="/Resources/Bird%20Images/crow_frontpage.png" alt="Crow on the home screen">
  </div>

  <script src="birds.js"></script>
  <script src="abilities.js"></script>
  <script src="upgrades.js"></script>
  <script src="items.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="game.js"></script>
  <script>
    // Load the save and cache the home-page UI elements.
    const gameState = loadGameState();
    initCloudSaveForCurrentPage(gameState, { reloadOnRemoteLoad: true });
    const speechOptions = [
      "Hey, Daddy-O", 
      "Stop closing the blinds when you change", 
      "You've got great cheekbones", 
      "*MEOW*", 
      "The American Dream is dead and I killed it", 
      "You are enough", 
      "*RIBBIT*", 
      "I can't do this anymore"];
    const topBar = document.querySelector("#topBar");
    const speechBubble = document.querySelector(".speech-bubble");
    const speechRoll = Math.random();
    let selectedSpeech;

    // The home page only needs a small amount of logic: one random speech line and the shared top bar.
    // Pick one home-page speech line using weighted random odds.
    if (speechRoll < 0.35) {
      selectedSpeech = "*CAW*";
    } else if (speechRoll < 0.70) {
      selectedSpeech = "*SQUAWK*";
    } else {
      const randomIndex = Math.floor(Math.random() * speechOptions.length);
      selectedSpeech = speechOptions[randomIndex];
    }

    // Keep the shared top bar current while this page is open.
    renderTopBar(topBar, gameState);
    initButtonAudio();
    initViewportAwareTooltips();
    startIncomeSystem(gameState, function () {
      renderTopBar(topBar, gameState);
    });
    speechBubble.textContent = selectedSpeech;
    speechBubble.style.visibility = "visible";
  </script>

</body>
</html>
