<!DOCTYPE html>
<html>
<head>
  <title>Flockmaster Aviary</title>
  <style>
    body {
      background-color: #b8b8b8;
      font-family: "Trebuchet MS", "Segoe UI", Verdana, sans-serif;
      margin: 0;
      color: #1f2a36;
    }

    .top-bar {
      background: #2c3e50;
      color: #f7f1e6;
      padding: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      box-sizing: border-box;
    }

    .top-bar-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .top-bar-link {
      color: #f7f1e6;
      text-decoration: none;
      cursor: pointer;
    }

    .top-bar-tooltip {
      position: relative;
      display: inline-block;
      cursor: default;
    }

    .top-bar-tooltip-box {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #f7f1e6;
      color: #1f2a36;
      border: 2px solid black;
      border-radius: 10px;
      padding: 8px 12px;
      white-space: nowrap;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
      letter-spacing: 0;
    }

    .top-bar-tooltip:hover .top-bar-tooltip-box {
      visibility: visible;
      opacity: 1;
    }

    .page-title {
      color: #2c3e50;
      letter-spacing: 2px;
      margin: 28px 0 8px;
      text-align: center;
      text-shadow: 1px 1px 0 #d9d9d9;
    }

    .page-layout {
      display: flex;
      gap: 28px;
      padding: 24px 32px 40px;
      align-items: flex-start;
      box-sizing: border-box;
    }

    .aviary-sidebar {
      width: 40%;
    }

    .aviary-habitats {
      width: 60%;
    }

    .aviary-panel {
      background: #8fc7e8;
      border: 3px solid #2c3e50;
      border-radius: 18px;
      padding: 24px;
      box-sizing: border-box;
      margin-bottom: 22px;
    }

    .aviary-panel:last-child {
      margin-bottom: 0;
    }

    .card {
      background: #f7f1e6;
      border: 2px solid black;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 22px;
      box-sizing: border-box;
    }

    .card h2,
    .card h3 {
      margin-top: 0;
      color: #2c3e50;
    }

    .overview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .overview-header h2 {
      margin-bottom: 0;
    }

    .overview-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .back-link {
      display: inline-block;
      background: #2c3e50;
      color: #f7f1e6;
      text-decoration: none;
      padding: 12px 18px;
      border: 2px solid black;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 12px;
    }

    .overview-button {
      display: inline-block;
      background: #2c3e50;
      color: #f7f1e6;
      border: 2px solid black;
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
    }

    .overview-button.is-active {
      background: #17311e;
    }

    .habitat-header {
      margin-top: 0;
      color: #17311e;
      letter-spacing: 1px;
    }

    .habitat-bird-list {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: center;
      gap: 24px;
      min-height: 400px;
    }

    .habitat-bird-list.is-empty {
      min-height: 0;
      justify-content: flex-start;
    }

    .habitat-empty {
      margin: 0;
      font-size: 18px;
      font-weight: bold;
      color: #2c3e50;
    }

    .habitat-bird-figure {
      margin: 0;
      text-align: center;
      position: relative;
    }

    .habitat-bird-figure img {
      width: 280px;
      max-width: 80%;
      cursor: pointer;
    }

    .habitat-bird-tooltip {
      position: absolute;
      bottom: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%);
      background: #f7f1e6;
      color: #1f2a36;
      border: 2px solid black;
      border-radius: 10px;
      padding: 10px 14px;
      min-width: 180px;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
      text-align: left;
    }

    .habitat-bird-figure:hover .habitat-bird-tooltip {
      visibility: visible;
      opacity: 1;
    }

    .habitat-bird-tooltip p {
      margin: 0;
    }

    .habitat-bird-tooltip p + p {
      margin-top: 8px;
    }

    .stat-line {
      margin: 12px 0;
      font-size: 18px;
    }

    .bird-summary {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #b9b2a8;
    }

    .overview-divider {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #b9b2a8;
    }

    .bird-summary:first-of-type {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .bird-summary h3 {
      margin-bottom: 10px;
    }

    .habitat-bird-figure figcaption {
      margin-top: 10px;
      font-weight: bold;
      color: #17311e;
    }

    .bird-count-badge {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #2c3e50;
      color: #f7f1e6;
      font-size: 14px;
      vertical-align: middle;
    }
  </style>
</head>

<body>
  <div class="top-bar" id="topBar"></div>

  <h1 class="page-title">MY AVIARY</h1>

  <div class="page-layout">
    <div class="aviary-sidebar">
      <div class="card">
        <a class="back-link" href="index.html">Back To Home</a>
        <a class="back-link" href="birdCatching.html">Bird Catching</a>
      </div>

      <div class="card">
        <div class="overview-header">
          <h2>Flock Overview</h2>
          <div class="overview-controls">
            <button class="overview-button is-active" id="overviewMinimizeButton" type="button">Minimize</button>
            <button class="overview-button" id="overviewCityLivingButton" type="button">City Living</button>
            <button class="overview-button" id="overviewAllBirdsButton" type="button">All Birds</button>
          </div>
        </div>
        <p class="stat-line">Species Count: <span id="speciesCount"></span></p>
        <p class="stat-line">Twigs Per Second: <span id="twigsPerSecond"></span></p>
        <div id="birdOverviewList"></div>
      </div>

      <div class="card">
        <h2>Aviary Overview</h2>
        <p class="stat-line">Visitors Per Day: <span id="visPerDay"></span></p>
        <p class="stat-line">Coins Per Visitor: <span id="coinsPerVisitor"></span></p>
        <p class="stat-line">Habitats Owned: <span id="habitatsOwned"></span></p>
      </div>

      <div class="card">
        <div class="overview-header">
          <h2>Upgrades</h2>
          <div class="overview-controls">
            <button class="overview-button is-active" id="upgradesMinimizeButton" type="button">Minimize</button>
            <button class="overview-button" id="flockUpgradesButton" type="button">Flock Upgrades</button>
            <button class="overview-button" id="aviaryUpgradesButton" type="button">Aviary Upgrades</button>
          </div>
        </div>
        <div id="upgradesOverviewList"></div>
      </div>
    </div>

    <div class="aviary-habitats">
      <div class="aviary-panel">
        <h2 class="habitat-header" id="cityLivingHeader">City Living</h2>
        <div class="habitat-bird-list" id="cityLivingBirdList"></div>
      </div>

      <div class="aviary-panel">
        <h2 class="habitat-header" id="urbanWatersHeader">Urban Waters</h2>
        <div class="habitat-bird-list" id="urbanWatersBirdList"></div>
      </div>
    </div>
  </div>

  <script src="birds.js"></script>
  <script src="game.js"></script>
  <script>
    const gameState = loadGameState();
    const acquiredBirds = getAcquiredBirds(gameState);
    const visitorsPerDay = getVisitorsPerDay(gameState);
    const flock_diversity = getFlockDiversity(gameState);
    const twigsPerSecond = getTwigsPerSecond(gameState);
    const cityLivingTotals = getHabitatBirdTotals(gameState, "City Living");
    const topBar = document.querySelector("#topBar");
    const speciesCount = document.querySelector("#speciesCount");
    const visitorsPerDayDisplay = document.querySelector("#visPerDay");
    const twigsPerSecondDisplay = document.querySelector("#twigsPerSecond");
    const coinsPerVisitorDisplay = document.querySelector("#coinsPerVisitor");
    const habitatsOwnedDisplay = document.querySelector("#habitatsOwned");
    const birdOverviewList = document.querySelector("#birdOverviewList");
    const upgradesOverviewList = document.querySelector("#upgradesOverviewList");
    const cityLivingBirdList = document.querySelector("#cityLivingBirdList");
    const urbanWatersBirdList = document.querySelector("#urbanWatersBirdList");
    const cityLivingHeader = document.querySelector("#cityLivingHeader");
    const urbanWatersHeader = document.querySelector("#urbanWatersHeader");
    const overviewMinimizeButton = document.querySelector("#overviewMinimizeButton");
    const overviewCityLivingButton = document.querySelector("#overviewCityLivingButton");
    const overviewAllBirdsButton = document.querySelector("#overviewAllBirdsButton");
    const upgradesMinimizeButton = document.querySelector("#upgradesMinimizeButton");
    const flockUpgradesButton = document.querySelector("#flockUpgradesButton");
    const aviaryUpgradesButton = document.querySelector("#aviaryUpgradesButton");
    let activeOverviewMode = "minimize";
    let activeUpgradesMode = "minimize";

    updateCoinsFromElapsedTime(gameState, Date.now());
    renderTopBar(topBar, gameState);
    startIncomeSystem(gameState, function () {
      renderTopBar(topBar, gameState);
    });
    const urbanWatersTotals = getHabitatBirdTotals(gameState, "Urban Waters");
    cityLivingHeader.textContent = "City Living (" + cityLivingTotals.acquiredSpecies + "/" + cityLivingTotals.totalSpecies + ")";
    urbanWatersHeader.textContent = "Urban Waters (" + urbanWatersTotals.acquiredSpecies + "/" + urbanWatersTotals.totalSpecies + ")";
    speciesCount.textContent = flock_diversity;
    visitorsPerDayDisplay.textContent = visitorsPerDay;
    twigsPerSecondDisplay.textContent = twigsPerSecond.toFixed(2);
    coinsPerVisitorDisplay.textContent = "+0.1 coins/sec";
    habitatsOwnedDisplay.textContent = gameState.ownedHabitats.length;

    function setActiveOverviewButton() {
      overviewMinimizeButton.classList.toggle("is-active", activeOverviewMode === "minimize");
      overviewCityLivingButton.classList.toggle("is-active", activeOverviewMode === "city-living");
      overviewAllBirdsButton.classList.toggle("is-active", activeOverviewMode === "all-birds");
    }

    function appendBirdSummary(bird) {
      const birdSummary = document.createElement("div");
      birdSummary.className = "bird-summary";
      birdSummary.innerHTML =
        "<h3>" + bird.species + "</h3>" +
        "<p class='stat-line'>" + bird.scientificName + "</p>" +
        "<p class='stat-line'>Visitors Per Day: +" + bird.visitorsPerDay + "</p>" +
        (typeof bird.twigsPerSecond === "number"
          ? "<p class='stat-line'>Twigs Per Second: +" + bird.twigsPerSecond.toFixed(2) + "</p>"
          : "") +
        "<p class='stat-line'>Rarity: " + bird.rarity + "</p>";
      birdOverviewList.appendChild(birdSummary);
    }

    function renderOverview() {
      birdOverviewList.innerHTML = "";
      setActiveOverviewButton();

      if (activeOverviewMode === "minimize") {
        return;
      }

      const divider = document.createElement("div");
      divider.className = "overview-divider";
      birdOverviewList.appendChild(divider);

      const birdsToShow = activeOverviewMode === "city-living"
        ? acquiredBirds.filter(function (bird) {
            return bird.nativeHabitat === "City Living";
          })
        : acquiredBirds;

      birdsToShow.forEach(function (bird) {
        appendBirdSummary(bird);
      });
    }

    function setActiveUpgradesButton() {
      upgradesMinimizeButton.classList.toggle("is-active", activeUpgradesMode === "minimize");
      flockUpgradesButton.classList.toggle("is-active", activeUpgradesMode === "flock");
      aviaryUpgradesButton.classList.toggle("is-active", activeUpgradesMode === "aviary");
    }

    function renderUpgradesOverview() {
      upgradesOverviewList.innerHTML = "";
      setActiveUpgradesButton();
    }

    overviewMinimizeButton.addEventListener("click", function () {
      activeOverviewMode = "minimize";
      renderOverview();
    });

    overviewCityLivingButton.addEventListener("click", function () {
      activeOverviewMode = "city-living";
      renderOverview();
    });

    overviewAllBirdsButton.addEventListener("click", function () {
      activeOverviewMode = "all-birds";
      renderOverview();
    });

    upgradesMinimizeButton.addEventListener("click", function () {
      activeUpgradesMode = "minimize";
      renderUpgradesOverview();
    });

    flockUpgradesButton.addEventListener("click", function () {
      activeUpgradesMode = "flock";
      renderUpgradesOverview();
    });

    aviaryUpgradesButton.addEventListener("click", function () {
      activeUpgradesMode = "aviary";
      renderUpgradesOverview();
    });

    function renderHabitatPanel(habitatName, habitatBirdList) {
      const birdsInHabitat = acquiredBirds.filter(function (bird) {
        return bird.nativeHabitat === habitatName;
      });

      habitatBirdList.innerHTML = "";

      if (birdsInHabitat.length === 0) {
        habitatBirdList.classList.add("is-empty");
        habitatBirdList.innerHTML = "<p class='habitat-empty'>Not Constructed</p>";
        return;
      }

      habitatBirdList.classList.remove("is-empty");

      birdsInHabitat.forEach(function (bird) {
      const habitatFigure = document.createElement("figure");
      habitatFigure.className = "habitat-bird-figure";
      const totalVisitors = bird.visitorsPerDay * bird.count;
      const totalTwigs = (bird.twigsPerSecond || 0) * bird.count;
      habitatFigure.innerHTML =
        "<div class='habitat-bird-tooltip'>" +
        "<p>Visitors Per Day: +" + totalVisitors + "</p>" +
        (typeof bird.twigsPerSecond === "number"
          ? "<p>Twigs Per Second: +" + totalTwigs.toFixed(2).replace(/\.00$/, '').replace(/(\.\d)0$/, '$1') + "</p>"
          : "") +
        "</div>" +
        "<img src='" + bird.image + "' alt='" + bird.species + " inside the aviary habitat'>" +
        "<figcaption>" + bird.species +
        (bird.count > 1 ? "<span class='bird-count-badge'>x" + bird.count + "</span>" : "") +
        "</figcaption>";
      habitatBirdList.appendChild(habitatFigure);

      const habitatImage = habitatFigure.querySelector("img");

      habitatImage.addEventListener("click", function () {
        const birdCall = new Audio(bird.call);
        birdCall.currentTime = 0;
        birdCall.play();
      });
      });
    }

    renderHabitatPanel("City Living", cityLivingBirdList);
    renderHabitatPanel("Urban Waters", urbanWatersBirdList);

    renderOverview();
    renderUpgradesOverview();
  </script>
</body>
</html>
