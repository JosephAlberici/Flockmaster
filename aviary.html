<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flockmaster Aviary</title>
  <style>
    body {
      background-color: #b8b8b8;
      font-family: "Trebuchet MS", "Segoe UI", Verdana, sans-serif;
      margin: 0;
      color: #1f2a36;
    }

    .top-bar {
      background: #2c3e50;
      color: #f7f1e6;
      padding: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      box-sizing: border-box;
    }

    .top-bar-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .top-bar-link {
      color: #f7f1e6;
      text-decoration: none;
      cursor: pointer;
    }

    .top-bar-tooltip {
      position: relative;
      display: inline-block;
      cursor: default;
    }

    .top-bar-tooltip-box {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #f7f1e6;
      color: #1f2a36;
      border: 2px solid black;
      border-radius: 10px;
      padding: 8px 12px;
      white-space: nowrap;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
      letter-spacing: 0;
    }

    .top-bar-tooltip:hover .top-bar-tooltip-box {
      visibility: visible;
      opacity: 1;
    }

    .page-title {
      color: #2c3e50;
      letter-spacing: 2px;
      margin: 28px 0 8px;
      text-align: center;
      text-shadow: 1px 1px 0 #d9d9d9;
    }

    .page-layout {
      display: flex;
      gap: 28px;
      padding: 24px 32px 40px;
      align-items: flex-start;
      box-sizing: border-box;
    }

    .aviary-sidebar {
      width: 40%;
    }

    .aviary-habitats {
      width: 60%;
    }

    .aviary-panel {
      background: #8fc7e8;
      border: 3px solid #2c3e50;
      border-radius: 18px;
      padding: 24px;
      box-sizing: border-box;
      margin-bottom: 22px;
    }

    .aviary-panel:last-child {
      margin-bottom: 0;
    }

    .card {
      background: #f7f1e6;
      border: 2px solid black;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 22px;
      box-sizing: border-box;
    }

    .card h2,
    .card h3 {
      margin-top: 0;
      color: #2c3e50;
    }

    .rarity-uncommon {
      color: #2f8f46;
      font-weight: bold;
    }

    .rarity-rare {
      color: #2f6fd4;
      font-weight: bold;
    }

    .rarity-epic {
      color: #7d46c7;
      font-weight: bold;
    }

    .rarity-legendary {
      color: #d4b55a;
      font-weight: bold;
    }

    .overview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .overview-header h2 {
      margin-bottom: 0;
    }

    .overview-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .back-link {
      display: inline-block;
      background: #2c3e50;
      color: #f7f1e6;
      text-decoration: none;
      padding: 12px 18px;
      border: 2px solid black;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 12px;
    }

    .overview-button {
      display: inline-block;
      background: #2c3e50;
      color: #f7f1e6;
      border: 2px solid black;
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
    }

    .overview-button.is-active {
      background: #17311e;
    }

    .habitat-header {
      margin-top: 0;
      color: #17311e;
      letter-spacing: 1px;
    }

    .habitat-bird-list {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: center;
      gap: 24px;
      min-height: 400px;
    }

    .habitat-bird-list.is-empty {
      min-height: 0;
      justify-content: flex-start;
    }

    .habitat-empty {
      margin: 0;
      font-size: 18px;
      font-weight: bold;
      color: #2c3e50;
    }

    .habitat-bird-figure {
      margin: 0;
      text-align: center;
      position: relative;
    }

    .habitat-bird-figure img {
      width: 280px;
      max-width: 80%;
      cursor: pointer;
    }

    .habitat-bird-image-group {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .habitat-bird-image-group img {
      width: 220px;
      max-width: 46%;
    }

    .habitat-bird-figure img[data-bird-id="cardinal"][data-variant="male"] {
      transform: scale(1.1);
      transform-origin: bottom center;
    }

    .habitat-bird-tooltip {
      position: absolute;
      bottom: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%);
      background: #f7f1e6;
      color: #1f2a36;
      border: 2px solid black;
      border-radius: 10px;
      padding: 10px 14px;
      min-width: 180px;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
      text-align: left;
    }

    .habitat-bird-figure:hover .habitat-bird-tooltip {
      visibility: visible;
      opacity: 1;
    }

    .habitat-bird-tooltip p {
      margin: 0;
    }

    .habitat-bird-tooltip p + p {
      margin-top: 8px;
    }

    .stat-line {
      margin: 12px 0;
      font-size: 18px;
    }

    #birdOverviewList.overview-two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-auto-flow: column;
      column-gap: 24px;
      align-items: start;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #b9b2a8;
    }

    .bird-summary {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #b9b2a8;
    }

    .bird-summary.is-first-summary {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .overview-divider {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #b9b2a8;
    }

    #birdOverviewList.overview-two-column .overview-divider {
      display: none;
    }

    .bird-summary h3 {
      margin-bottom: 10px;
    }

    .bird-summary .upgrade-tooltip {
      display: block;
      position: relative;
      margin-top: 0;
      margin-bottom: 0;
    }

    .bird-summary .upgrade-tooltip-box {
      white-space: normal;
      min-width: 220px;
    }

    .bird-summary .upgrade-tooltip .stat-line {
      margin: 12px 0;
    }

    .habitat-bird-figure figcaption {
      margin-top: 10px;
      font-weight: bold;
      color: #17311e;
    }

    .bird-count-badge {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #2c3e50;
      color: #f7f1e6;
      font-size: 14px;
      vertical-align: middle;
    }

    .upgrade-section-title {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: bold;
      color: #2c3e50;
    }

    .upgrade-entry {
      margin-bottom: 14px;
    }

    .upgrade-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 14px;
      align-items: start;
    }

    .upgrade-row.upgrade-row-three {
      grid-template-columns: repeat(3, 1fr);
    }

    .upgrade-action-button {
      display: block;
      width: 100%;
      background: #2c3e50;
      color: #f7f1e6;
      border: 2px solid black;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
    }

    .upgrade-requirement {
      margin: 8px 0 0;
      color: #2c3e50;
      font-weight: bold;
    }

    .upgrade-entry .upgrade-action-button.is-placeholder {
      background: #6f7780;
      color: #d7dde4;
      cursor: default;
    }

    .upgrade-tooltip {
      position: relative;
      display: block;
    }

    .upgrade-tooltip-box {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      background: #f7f1e6;
      color: #1f2a36;
      border: 2px solid black;
      border-radius: 10px;
      padding: 8px 12px;
      white-space: nowrap;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
    }

    .upgrade-tooltip:hover .upgrade-tooltip-box {
      visibility: visible;
      opacity: 1;
    }

    .nav-tooltip {
      position: relative;
      display: inline-block;
    }

    .nav-tooltip-box {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      background: #f7f1e6;
      color: #1f2a36;
      border: 2px solid black;
      border-radius: 10px;
      padding: 8px 12px;
      white-space: nowrap;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
    }

    .nav-tooltip:hover .nav-tooltip-box {
      visibility: visible;
      opacity: 1;
    }

    .back-link.is-locked {
      background: #6f7780;
      color: #d7dde4;
      cursor: default;
      pointer-events: none;
    }

    .overview-stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 28px;
      align-items: start;
    }

    .overview-stat-column .stat-line:first-child {
      margin-top: 0;
    }
  </style>
</head>

<body>
  <div class="top-bar" id="topBar"></div>

  <h1 class="page-title">MY AVIARY</h1>

  <div class="page-layout">
    <div class="aviary-sidebar">
      <div class="card">
        <a class="back-link" href="index.html">Back To Home</a>
        <a class="back-link" href="birdCatching.html">Bird Catching</a>
        <span class="nav-tooltip" id="earthworksNavWrapper"></span>
      </div>

      <div class="card">
        <div class="overview-header">
          <h2>Flock Overview</h2>
          <div class="overview-controls">
            <button class="overview-button is-active" id="overviewMinimizeButton" type="button">Minimize</button>
            <button class="overview-button" id="overviewCityLivingButton" type="button">City Living</button>
            <button class="overview-button" id="overviewAllBirdsButton" type="button">Urban Waters</button>
          </div>
        </div>
        <p class="stat-line">Species Count: <span id="speciesCount"></span></p>
        <p class="stat-line">Max Offline Duration: <span id="maxOfflineDuration"></span> hours</p>
        <p class="stat-line">Grubs Per Second: <span id="grubsPerSecond"></span></p>
        <p class="stat-line">Twigs Per Second: <span id="twigsPerSecond"></span></p>
        <div id="birdOverviewList"></div>
      </div>

      <div class="card">
        <h2>Aviary Overview</h2>
        <div class="overview-stat-grid">
          <div class="overview-stat-column">
            <p class="stat-line">Visitors Per Day: <span id="visPerDay"></span></p>
            <p class="stat-line">Coins Per Visitor: <span id="coinsPerVisitor"></span></p>
            <p class="stat-line">Habitats Owned: <span id="habitatsOwned"></span></p>
          </div>
          <div class="overview-stat-column">
            <p class="stat-line">Coins Per Second: <span id="coinsPerSecond"></span></p>
            <p class="stat-line">Seeds Per Second: <span id="seedsPerSecond"></span></p>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="overview-header">
          <h2>Upgrades</h2>
          <div class="overview-controls">
            <button class="overview-button is-active" id="upgradesMinimizeButton" type="button">Minimize</button>
            <button class="overview-button" id="flockUpgradesButton" type="button">Flock Upgrades</button>
            <button class="overview-button" id="aviaryUpgradesButton" type="button">Aviary Upgrades</button>
          </div>
        </div>
        <div id="upgradesOverviewList"></div>
      </div>
    </div>

    <div class="aviary-habitats">
      <div class="aviary-panel">
        <h2 class="habitat-header" id="cityLivingHeader">City Living</h2>
        <div class="habitat-bird-list" id="cityLivingBirdList"></div>
      </div>

      <div class="aviary-panel">
        <h2 class="habitat-header" id="urbanWatersHeader">Urban Waters</h2>
        <div class="habitat-bird-list" id="urbanWatersBirdList"></div>
      </div>
    </div>
  </div>

  <script src="birds.js"></script>
  <script src="abilities.js"></script>
  <script src="game.js"></script>
  <script>
    // Cache page state and the main UI elements this screen updates.
    const gameState = loadGameState();
    const topBar = document.querySelector("#topBar");
    const speciesCount = document.querySelector("#speciesCount");
    const maxOfflineDurationDisplay = document.querySelector("#maxOfflineDuration");
    const visitorsPerDayDisplay = document.querySelector("#visPerDay");
    const grubsPerSecondDisplay = document.querySelector("#grubsPerSecond");
    const twigsPerSecondDisplay = document.querySelector("#twigsPerSecond");
    const coinsPerVisitorDisplay = document.querySelector("#coinsPerVisitor");
    const habitatsOwnedDisplay = document.querySelector("#habitatsOwned");
    const coinsPerSecondDisplay = document.querySelector("#coinsPerSecond");
    const seedsPerSecondDisplay = document.querySelector("#seedsPerSecond");
    const birdOverviewList = document.querySelector("#birdOverviewList");
    const upgradesOverviewList = document.querySelector("#upgradesOverviewList");
    const cityLivingBirdList = document.querySelector("#cityLivingBirdList");
    const urbanWatersBirdList = document.querySelector("#urbanWatersBirdList");
    const cityLivingHeader = document.querySelector("#cityLivingHeader");
    const urbanWatersHeader = document.querySelector("#urbanWatersHeader");
    const overviewMinimizeButton = document.querySelector("#overviewMinimizeButton");
    const overviewCityLivingButton = document.querySelector("#overviewCityLivingButton");
    const overviewAllBirdsButton = document.querySelector("#overviewAllBirdsButton");
    const upgradesMinimizeButton = document.querySelector("#upgradesMinimizeButton");
    const flockUpgradesButton = document.querySelector("#flockUpgradesButton");
    const aviaryUpgradesButton = document.querySelector("#aviaryUpgradesButton");
    const earthworksNavWrapper = document.querySelector("#earthworksNavWrapper");
    let activeOverviewMode = "minimize";
    let activeUpgradesMode = "minimize";

    function renderEarthworksNav() {
      earthworksNavWrapper.innerHTML = "";

      if (isEarthworksUnlocked(gameState)) {
        earthworksNavWrapper.innerHTML = "<a class='back-link' href='earthworks.html'>Earthworks</a>";
        return;
      }

      earthworksNavWrapper.innerHTML =
        "<span class='back-link is-locked'>Earthworks</span>" +
        "<span class='nav-tooltip-box'>Unlock at 4 Species</span>";
    }

    function getAcquiredBirdsSnapshot() {
      return getAcquiredBirds(gameState);
    }

    // Refresh the summary cards and habitat headers from current save data.
    function refreshAviarySummary() {
      const cityLivingTotals = getHabitatBirdTotals(gameState, "City Living");
      const urbanWatersTotals = getHabitatBirdTotals(gameState, "Urban Waters");

      cityLivingHeader.textContent = "City Living (" + cityLivingTotals.acquiredSpecies + "/" + cityLivingTotals.totalSpecies + ")";
      urbanWatersHeader.textContent = "Urban Waters (" + urbanWatersTotals.acquiredSpecies + "/" + urbanWatersTotals.totalSpecies + ")";
      speciesCount.textContent = getFlockDiversity(gameState);
      maxOfflineDurationDisplay.textContent = getMaxOfflineDurationLabel(gameState);
      visitorsPerDayDisplay.textContent = getVisitorsPerDay(gameState);
      grubsPerSecondDisplay.textContent = getGrubsPerSecond(gameState).toFixed(2);
      twigsPerSecondDisplay.textContent = getTwigsPerSecond(gameState).toFixed(2);
      coinsPerVisitorDisplay.textContent = "+" + getCoinsPerVisitorRate(gameState).toFixed(1) + " coins/sec";
      habitatsOwnedDisplay.textContent = gameState.ownedHabitats.length;
      coinsPerSecondDisplay.textContent = "+" + getCoinsPerSecond(gameState).toFixed(1);
      seedsPerSecondDisplay.textContent = "+" + getSeedsPerSecond(gameState).toFixed(1);
    }

    // Toggle which flock-overview button is visually active.
    function setActiveOverviewButton() {
      overviewMinimizeButton.classList.toggle("is-active", activeOverviewMode === "minimize");
      overviewCityLivingButton.classList.toggle("is-active", activeOverviewMode === "city-living");
      overviewAllBirdsButton.classList.toggle("is-active", activeOverviewMode === "urban-waters");
    }

    // Toggle which upgrades-tab button is visually active.
    function setActiveUpgradesButton() {
      upgradesMinimizeButton.classList.toggle("is-active", activeUpgradesMode === "minimize");
      flockUpgradesButton.classList.toggle("is-active", activeUpgradesMode === "flock");
      aviaryUpgradesButton.classList.toggle("is-active", activeUpgradesMode === "aviary");
    }

    // Build one bird summary row for the flock overview panel.
    function appendBirdSummary(bird) {
      const birdSummary = document.createElement("div");
      birdSummary.className = "bird-summary";
      const birdAbilityNames = getBirdAbilityNames(bird);
      const birdAbilityDescriptions = getBirdAbilityDescriptions(bird);
      const rarityClassName = getRarityClassName(bird.rarity);
      birdSummary.innerHTML =
        "<h3>" + bird.species + "</h3>" +
        "<p class='stat-line'>Diet: " + bird.diet + "</p>" +
        (typeof bird.visitorsPerDay === "number"
          ? "<p class='stat-line'>Visitors Per Day: +" + getBirdVisitorRatePerDay(bird, gameState) + "</p>"
          : "") +
        (typeof bird.grubsPerSecond === "number"
          ? "<p class='stat-line'>Grubs Per Second: +" + getBirdGrubRatePerSecond(bird).toFixed(2) + "</p>"
          : "") +
        (typeof bird.twigsPerSecond === "number"
          ? "<p class='stat-line'>Twigs Per Second: +" + getBirdTwigRatePerSecond(bird, gameState).toFixed(2) + "</p>"
          : "") +
        (typeof bird.seedsPerSecond === "number"
          ? "<p class='stat-line'>Seeds Per Second: +" + getBirdSeedRatePerSecond(bird, gameState).toFixed(2) + "</p>"
          : "") +
        (birdAbilityNames.length > 0
          ? "<div class='upgrade-tooltip'><p class='stat-line'>Ability: " + birdAbilityNames.join(", ") + "</p><div class='upgrade-tooltip-box'>" + birdAbilityDescriptions.join("<br><br>") + "</div></div>"
          : "") +
        "<p class='stat-line'>Rarity: <span class='" + rarityClassName + "'>" + bird.rarity + "</span></p>";
      birdOverviewList.appendChild(birdSummary);
    }

    // Decide when a habitat overview should split into two vertical columns.
    function getOverviewSplitPointForMode(mode) {
      if (mode === "city-living") {
        return Math.ceil(getHabitatBirdTotals(gameState, "City Living").totalSpecies / 2);
      }

      if (mode === "urban-waters") {
        return Math.ceil(getHabitatBirdTotals(gameState, "Urban Waters").totalSpecies / 2);
      }

      return Math.ceil(gameState.birds.length / 2);
    }

    // Render the flock overview in compact or expanded mode.
    function renderOverview() {
      const acquiredBirds = getAcquiredBirdsSnapshot();
      birdOverviewList.innerHTML = "";
      birdOverviewList.classList.remove("overview-two-column");
      setActiveOverviewButton();

      if (activeOverviewMode === "minimize") {
        return;
      }

      const birdsToShow = activeOverviewMode === "city-living"
        ? acquiredBirds.filter(function (bird) {
            return bird.nativeHabitat === "City Living";
          })
        : acquiredBirds.filter(function (bird) {
            return bird.nativeHabitat === "Urban Waters";
          });

      const overviewSplitPoint = getOverviewSplitPointForMode(activeOverviewMode);

      if (birdsToShow.length > overviewSplitPoint) {
        birdOverviewList.classList.add("overview-two-column");
        birdOverviewList.style.gridTemplateRows = "repeat(" + overviewSplitPoint + ", auto)";
      } else {
        birdOverviewList.style.gridTemplateRows = "";
        const divider = document.createElement("div");
        divider.className = "overview-divider";
        birdOverviewList.appendChild(divider);
      }

      birdsToShow.forEach(function (bird, index) {
        appendBirdSummary(bird);
        const latestSummary = birdOverviewList.lastElementChild;
        if (
          latestSummary &&
          latestSummary.classList.contains("bird-summary") &&
          (index === 0 || (birdsToShow.length > overviewSplitPoint && index === overviewSplitPoint))
        ) {
          latestSummary.classList.add("is-first-summary");
        }
      });
    }

    // Render one habitat panel, including its empty or unconstructed state.
    function renderHabitatPanel(habitatName, habitatBirdList) {
      const acquiredBirds = getAcquiredBirdsSnapshot();
      const birdsInHabitat = acquiredBirds.filter(function (bird) {
        return bird.nativeHabitat === habitatName;
      });

      habitatBirdList.innerHTML = "";

      if (!gameState.ownedHabitats.includes(habitatName)) {
        habitatBirdList.classList.add("is-empty");
        habitatBirdList.innerHTML = "<p class='habitat-empty'>Not Constructed</p>";
        return;
      }

      if (birdsInHabitat.length === 0) {
        habitatBirdList.classList.add("is-empty");
        habitatBirdList.innerHTML = "<p class='habitat-empty'>No Birds Present</p>";
        return;
      }

      habitatBirdList.classList.remove("is-empty");

      birdsInHabitat.forEach(function (bird) {
        const habitatFigure = document.createElement("figure");
        habitatFigure.className = "habitat-bird-figure";
        const birdAbilityNames = getBirdAbilityNames(bird);
        const habitatImages = getBirdHabitatImages(bird);
        const imageMarkup = habitatImages.length > 1
          ? "<div class='habitat-bird-image-group'>" + habitatImages.map(function (imageEntry) {
              return "<img src='" + imageEntry.src + "' alt='" + imageEntry.alt + "' data-bird-id='" + bird.id + "' data-variant='" + (imageEntry.variantKey || "") + "'>";
            }).join("") + "</div>"
          : "<img src='" + habitatImages[0].src + "' alt='" + habitatImages[0].alt + "' data-bird-id='" + bird.id + "' data-variant='" + (habitatImages[0].variantKey || "") + "'>";
        const totalVisitors = getBirdVisitorRatePerDay(bird, gameState) * bird.count;
        const totalGrubs = getBirdGrubRatePerSecond(bird) * bird.count;
        const totalTwigs = getBirdTwigRatePerSecond(bird, gameState) * bird.count;
        const totalSeeds = getBirdSeedRatePerSecond(bird, gameState) * bird.count;

        habitatFigure.innerHTML =
          "<div class='habitat-bird-tooltip'>" +
            (typeof bird.visitorsPerDay === "number"
              ? "<p>Visitors Per Day: +" + totalVisitors + "</p>"
              : "") +
            (typeof bird.grubsPerSecond === "number"
              ? "<p>Grubs Per Second: +" + totalGrubs.toFixed(2).replace(/\\.00$/, '').replace(/(\\.\\d)0$/, '$1') + "</p>"
              : "") +
            (typeof bird.twigsPerSecond === "number"
              ? "<p>Twigs Per Second: +" + totalTwigs.toFixed(2).replace(/\\.00$/, '').replace(/(\\.\\d)0$/, '$1') + "</p>"
              : "") +
            (typeof bird.seedsPerSecond === "number"
              ? "<p>Seeds Per Second: +" + totalSeeds.toFixed(2).replace(/\\.00$/, '').replace(/(\\.\\d)0$/, '$1') + "</p>"
              : "") +
            (birdAbilityNames.length > 0
              ? "<p>Ability: " + birdAbilityNames.join(", ") + "</p>"
              : "") +
          "</div>" +
          imageMarkup +
          "<figcaption>" + bird.species +
            (bird.count > 1 ? "<span class='bird-count-badge'>x" + bird.count + "</span>" : "") +
          "</figcaption>";

        habitatBirdList.appendChild(habitatFigure);

        habitatFigure.querySelectorAll("img").forEach(function (habitatImage) {
          habitatImage.addEventListener("click", function () {
            const birdCall = new Audio(bird.call);
            birdCall.currentTime = 0;
            birdCall.play();
          });
        });
      });
    }

    // Refresh all Aviary-specific UI after an upgrade or state change.
    function rerenderAviary() {
      refreshAviarySummary();
      renderTopBar(topBar, gameState);
      renderOverview();
      renderUpgradesOverview();
      renderHabitatPanel("City Living", cityLivingBirdList);
      renderHabitatPanel("Urban Waters", urbanWatersBirdList);
    }

    // Render the active upgrades tab for either flock or aviary upgrades.
    function renderUpgradesOverview() {
      upgradesOverviewList.innerHTML = "";
      setActiveUpgradesButton();

      if (activeUpgradesMode === "minimize") {
        return;
      }

      if (activeUpgradesMode === "flock") {
        const flockTitle = document.createElement("p");
        flockTitle.className = "upgrade-section-title";
        flockTitle.textContent = "Population Bonuses";
        upgradesOverviewList.appendChild(flockTitle);

        const populationRow = document.createElement("div");
        populationRow.className = "upgrade-row upgrade-row-three";
        upgradesOverviewList.appendChild(populationRow);

        const murderPartyEntry = document.createElement("div");
        murderPartyEntry.className = "upgrade-entry";

        const murderPartyTooltip = document.createElement("div");
        murderPartyTooltip.className = "upgrade-tooltip";

        const murderPartyButton = document.createElement("button");
        murderPartyButton.className = "upgrade-action-button";
        murderPartyButton.type = "button";
        murderPartyButton.dataset.requiresSuccess = "true";
        murderPartyButton.textContent = gameState.murderPartyPurchased
          ? "Murder Party (Active)"
          : "Murder Party";

        murderPartyButton.addEventListener("click", function () {
          const crowInFlock = gameState.birds.find(function (bird) {
            return bird.id === "crow";
          });

          if (gameState.murderPartyPurchased) {
            return;
          }

          if (!crowInFlock || crowInFlock.count < 3) {
            return;
          }

          gameState.murderPartyPurchased = true;
          playButtonSound();
          saveGameState(gameState);
          rerenderAviary();
        });

        const murderPartyTooltipBox = document.createElement("div");
        murderPartyTooltipBox.className = "upgrade-tooltip-box";
        murderPartyTooltipBox.textContent = "Doubles visitors per day generated by crows";

        const murderPartyRequirement = document.createElement("p");
        murderPartyRequirement.className = "upgrade-requirement";
        murderPartyRequirement.textContent = "Requires: " + formatLargeNumber(3) + " Crows";

        murderPartyTooltip.appendChild(murderPartyButton);
        murderPartyTooltip.appendChild(murderPartyTooltipBox);
        murderPartyEntry.appendChild(murderPartyTooltip);
        murderPartyEntry.appendChild(murderPartyRequirement);
        populationRow.appendChild(murderPartyEntry);

        const turtleWakeEntry = document.createElement("div");
        turtleWakeEntry.className = "upgrade-entry";

        const turtleWakeTooltip = document.createElement("div");
        turtleWakeTooltip.className = "upgrade-tooltip";

        const turtleWakeButton = document.createElement("button");
        turtleWakeButton.className = "upgrade-action-button";
        turtleWakeButton.type = "button";
        turtleWakeButton.dataset.requiresSuccess = "true";
        turtleWakeButton.textContent = gameState.turtleWakePurchased
          ? "Turtle Wake (Active)"
          : "Turtle Wake";

        turtleWakeButton.addEventListener("click", function () {
          const mourningDoveInFlock = gameState.birds.find(function (bird) {
            return bird.id === "mourningdove";
          });

          if (gameState.turtleWakePurchased) {
            return;
          }

          if (!mourningDoveInFlock || mourningDoveInFlock.count < 5) {
            return;
          }

          gameState.turtleWakePurchased = true;
          playButtonSound();
          saveGameState(gameState);
          rerenderAviary();
        });

        const turtleWakeTooltipBox = document.createElement("div");
        turtleWakeTooltipBox.className = "upgrade-tooltip-box";
        turtleWakeTooltipBox.textContent = "Mourning Doves start generating 0.04 twigs per second";

        const turtleWakeRequirement = document.createElement("p");
        turtleWakeRequirement.className = "upgrade-requirement";
        turtleWakeRequirement.textContent = "Requires: " + formatLargeNumber(5) + " Mourning Doves";

        turtleWakeTooltip.appendChild(turtleWakeButton);
        turtleWakeTooltip.appendChild(turtleWakeTooltipBox);
        turtleWakeEntry.appendChild(turtleWakeTooltip);
        turtleWakeEntry.appendChild(turtleWakeRequirement);
        populationRow.appendChild(turtleWakeEntry);

        const flockResourceTitle = document.createElement("p");
        flockResourceTitle.className = "upgrade-section-title";
        flockResourceTitle.textContent = "Resource Generation";
        upgradesOverviewList.appendChild(flockResourceTitle);

        const flockResourceRow = document.createElement("div");
        flockResourceRow.className = "upgrade-row upgrade-row-three";
        upgradesOverviewList.appendChild(flockResourceRow);

        const flockForestryEntry = document.createElement("div");
        flockForestryEntry.className = "upgrade-entry";

        const flockForestryTooltip = document.createElement("div");
        flockForestryTooltip.className = "upgrade-tooltip";

        const flockForestryButton = document.createElement("button");
        flockForestryButton.className = "upgrade-action-button";
        flockForestryButton.type = "button";
        flockForestryButton.dataset.requiresSuccess = "true";
        flockForestryButton.textContent = gameState.flockForestryPurchased
          ? "Flock Forestry (Active)"
          : "Flock Forestry (" + formatLargeNumber(50000) + " Coins)";

        flockForestryButton.addEventListener("click", function () {
          updateCoinsFromElapsedTime(gameState, Date.now());

          if (gameState.flockForestryPurchased) {
            return;
          }

          if (getFlockDiversity(gameState) < 7 || gameState.coins < 50000) {
            return;
          }

          gameState.coins -= 50000;
          gameState.flockForestryPurchased = true;
          playButtonSound();
          saveGameState(gameState);
          rerenderAviary();
        });

        const flockForestryTooltipBox = document.createElement("div");
        flockForestryTooltipBox.className = "upgrade-tooltip-box";
        flockForestryTooltipBox.textContent = "Doubles seeds per second and twigs per second generated by birds";

        const flockForestryRequirement = document.createElement("p");
        flockForestryRequirement.className = "upgrade-requirement";
        flockForestryRequirement.textContent = "Requires: " + formatLargeNumber(7) + " Species";

        flockForestryTooltip.appendChild(flockForestryButton);
        flockForestryTooltip.appendChild(flockForestryTooltipBox);
        flockForestryEntry.appendChild(flockForestryTooltip);
        flockForestryEntry.appendChild(flockForestryRequirement);
        flockResourceRow.appendChild(flockForestryEntry);
        return;
      }

      const constructTitle = document.createElement("p");
      constructTitle.className = "upgrade-section-title";
      constructTitle.textContent = "Construct Habitats";
      upgradesOverviewList.appendChild(constructTitle);

      const urbanWatersEntry = document.createElement("div");
      urbanWatersEntry.className = "upgrade-entry";

      const urbanWatersTooltip = document.createElement("div");
      urbanWatersTooltip.className = "upgrade-tooltip";

      const urbanWatersButton = document.createElement("button");
      urbanWatersButton.className = "upgrade-action-button";
      urbanWatersButton.type = "button";
      urbanWatersButton.dataset.requiresSuccess = "true";
      urbanWatersButton.textContent = gameState.ownedHabitats.includes("Urban Waters")
        ? "Urban Waters (Constructed)"
        : "Urban Waters (" + formatLargeNumber(10000) + " Coins)";

      urbanWatersButton.addEventListener("click", function () {
        updateCoinsFromElapsedTime(gameState, Date.now());

        if (gameState.ownedHabitats.includes("Urban Waters")) {
          return;
        }

        if (getTotalBirdCount(gameState) < 20 || gameState.coins < 10000) {
          return;
        }

        gameState.coins -= 10000;
        gameState.ownedHabitats.push("Urban Waters");
        playButtonSound();
        saveGameState(gameState);
        rerenderAviary();
      });

      urbanWatersTooltip.appendChild(urbanWatersButton);
      urbanWatersEntry.appendChild(urbanWatersTooltip);

      const urbanWatersRequirement = document.createElement("p");
      urbanWatersRequirement.className = "upgrade-requirement";
      urbanWatersRequirement.textContent = "Requires: " + formatLargeNumber(20) + " Birds";
      urbanWatersEntry.appendChild(urbanWatersRequirement);
      upgradesOverviewList.appendChild(urbanWatersEntry);

      const divider = document.createElement("div");
      divider.className = "overview-divider";
      upgradesOverviewList.appendChild(divider);

      const amenitiesTitle = document.createElement("p");
      amenitiesTitle.className = "upgrade-section-title";
      amenitiesTitle.textContent = "Amenities";
      upgradesOverviewList.appendChild(amenitiesTitle);

      const amenitiesRow = document.createElement("div");
      amenitiesRow.className = "upgrade-row";

      const cafeEntry = document.createElement("div");
      cafeEntry.className = "upgrade-entry";

      const cafeTooltip = document.createElement("div");
      cafeTooltip.className = "upgrade-tooltip";

      const cafeButton = document.createElement("button");
      cafeButton.className = "upgrade-action-button";
      cafeButton.type = "button";
      cafeButton.dataset.requiresSuccess = "true";
      cafeButton.textContent = gameState.cafePurchased
        ? "Café (Owned)"
        : "Café (" + formatLargeNumber(1000) + " Coins)";

      cafeButton.addEventListener("click", function () {
        updateCoinsFromElapsedTime(gameState, Date.now());

        if (gameState.cafePurchased) {
          return;
        }

        if (getFlockDiversity(gameState) < 3 || gameState.coins < 1000) {
          return;
        }

        gameState.coins -= 1000;
        gameState.cafePurchased = true;
        playButtonSound();
        saveGameState(gameState);
        rerenderAviary();
      });

      const cafeTooltipBox = document.createElement("div");
      cafeTooltipBox.className = "upgrade-tooltip-box";
      cafeTooltipBox.textContent = "Adds +0.1 coins/sec for every visitor per day";

      cafeTooltip.appendChild(cafeButton);
      cafeTooltip.appendChild(cafeTooltipBox);
      cafeEntry.appendChild(cafeTooltip);

      const cafeRequirement = document.createElement("p");
      cafeRequirement.className = "upgrade-requirement";
      cafeRequirement.textContent = "Requires: " + formatLargeNumber(3) + " Species";
      cafeEntry.appendChild(cafeRequirement);
      amenitiesRow.appendChild(cafeEntry);

      const indoorGardenEntry = document.createElement("div");
      indoorGardenEntry.className = "upgrade-entry";

      const indoorGardenTooltip = document.createElement("div");
      indoorGardenTooltip.className = "upgrade-tooltip";

      const indoorGardenButton = document.createElement("button");
      indoorGardenButton.className = "upgrade-action-button";
      indoorGardenButton.type = "button";
      indoorGardenButton.dataset.requiresSuccess = "true";
      indoorGardenButton.textContent = gameState.indoorGardenPurchased
        ? "Indoor Garden (Owned)"
        : "Indoor Garden (" + formatLargeNumber(10000) + " Seeds)";

      indoorGardenButton.addEventListener("click", function () {
        updateCoinsFromElapsedTime(gameState, Date.now());

        const kestrelInFlock = gameState.birds.find(function (bird) {
          return bird.id === "kestrel";
        });

        if (gameState.indoorGardenPurchased) {
          return;
        }

        if (!kestrelInFlock || kestrelInFlock.count < 2) {
          return;
        }

        if (gameState.seeds < 10000) {
          return;
        }

        gameState.seeds -= 10000;
        gameState.indoorGardenPurchased = true;
        playButtonSound();
        saveGameState(gameState);
        rerenderAviary();
      });

      const indoorGardenTooltipBox = document.createElement("div");
      indoorGardenTooltipBox.className = "upgrade-tooltip-box";
      indoorGardenTooltipBox.textContent = "Doubles twigs per second generated by kestrels";

      indoorGardenTooltip.appendChild(indoorGardenButton);
      indoorGardenTooltip.appendChild(indoorGardenTooltipBox);
      indoorGardenEntry.appendChild(indoorGardenTooltip);

      const indoorGardenRequirement = document.createElement("p");
      indoorGardenRequirement.className = "upgrade-requirement";
      indoorGardenRequirement.textContent = "Requires: " + formatLargeNumber(2) + " Kestrels";
      indoorGardenEntry.appendChild(indoorGardenRequirement);
      amenitiesRow.appendChild(indoorGardenEntry);
      upgradesOverviewList.appendChild(amenitiesRow);

      const treasuryDivider = document.createElement("div");
      treasuryDivider.className = "overview-divider";
      upgradesOverviewList.appendChild(treasuryDivider);

      const treasuryTitle = document.createElement("p");
      treasuryTitle.className = "upgrade-section-title";
      treasuryTitle.textContent = "Treasury";
      upgradesOverviewList.appendChild(treasuryTitle);

      const treasuryRow = document.createElement("div");
      treasuryRow.className = "upgrade-row upgrade-row-three";

      const basketEntry = document.createElement("div");
      basketEntry.className = "upgrade-entry";

      const basketTooltip = document.createElement("div");
      basketTooltip.className = "upgrade-tooltip";

      const basketButton = document.createElement("button");
      basketButton.className = "upgrade-action-button";
      basketButton.type = "button";
      basketButton.dataset.requiresSuccess = "true";
      basketButton.textContent = gameState.basketPurchased
        ? "Basket (Owned)"
        : "Basket (" + formatLargeNumber(100) + " Twigs)";

      basketButton.addEventListener("click", function () {
        updateCoinsFromElapsedTime(gameState, Date.now());

        if (gameState.basketPurchased) {
          return;
        }

        if (gameState.twigs < 100) {
          return;
        }

        gameState.twigs -= 100;
        gameState.coinMax = 100000;
        gameState.basketPurchased = true;
        if (gameState.coins > gameState.coinMax) {
          gameState.coins = gameState.coinMax;
        }
        playButtonSound();
        saveGameState(gameState);
        rerenderAviary();
      });

      const basketTooltipBox = document.createElement("div");
      basketTooltipBox.className = "upgrade-tooltip-box";
      basketTooltipBox.textContent = "Increases maximum coins to 100k";

      basketTooltip.appendChild(basketButton);
      basketTooltip.appendChild(basketTooltipBox);
      basketEntry.appendChild(basketTooltip);
      treasuryRow.appendChild(basketEntry);

      const depositBoxEntry = document.createElement("div");
      depositBoxEntry.className = "upgrade-entry";

      const depositBoxTooltip = document.createElement("div");
      depositBoxTooltip.className = "upgrade-tooltip";

      const depositBoxButton = document.createElement("button");
      depositBoxButton.className = "upgrade-action-button";
      depositBoxButton.type = "button";
      depositBoxButton.dataset.requiresSuccess = "true";
      depositBoxButton.textContent = gameState.depositBoxPurchased
        ? "Deposit Box (Owned)"
        : "Deposit Box (" + formatLargeNumber(10) + " Hardwood)";

      depositBoxButton.addEventListener("click", function () {
        updateCoinsFromElapsedTime(gameState, Date.now());

        if (gameState.depositBoxPurchased) {
          return;
        }

        if (gameState.hardwood < 10) {
          return;
        }

        gameState.hardwood -= 10;
        gameState.coinMax = 1000000;
        gameState.depositBoxPurchased = true;
        if (gameState.coins > gameState.coinMax) {
          gameState.coins = gameState.coinMax;
        }
        playButtonSound();
        saveGameState(gameState);
        rerenderAviary();
      });

      const depositBoxTooltipBox = document.createElement("div");
      depositBoxTooltipBox.className = "upgrade-tooltip-box";
      depositBoxTooltipBox.textContent = "Increases maximum coins to 1M";

      depositBoxTooltip.appendChild(depositBoxButton);
      depositBoxTooltip.appendChild(depositBoxTooltipBox);
      depositBoxEntry.appendChild(depositBoxTooltip);
      treasuryRow.appendChild(depositBoxEntry);

      const simpleSafeEntry = document.createElement("div");
      simpleSafeEntry.className = "upgrade-entry";

      const simpleSafeButton = document.createElement("button");
      simpleSafeButton.className = "upgrade-action-button is-placeholder";
      simpleSafeButton.type = "button";
      simpleSafeButton.textContent = "Simple Safe";
      simpleSafeEntry.appendChild(simpleSafeButton);
      treasuryRow.appendChild(simpleSafeEntry);

      upgradesOverviewList.appendChild(treasuryRow);
    }

    overviewMinimizeButton.addEventListener("click", function () {
      activeOverviewMode = "minimize";
      renderOverview();
    });

    overviewCityLivingButton.addEventListener("click", function () {
      activeOverviewMode = "city-living";
      renderOverview();
    });

    overviewAllBirdsButton.addEventListener("click", function () {
      activeOverviewMode = "urban-waters";
      renderOverview();
    });

    upgradesMinimizeButton.addEventListener("click", function () {
      activeUpgradesMode = "minimize";
      renderUpgradesOverview();
    });

    flockUpgradesButton.addEventListener("click", function () {
      activeUpgradesMode = "flock";
      renderUpgradesOverview();
    });

    aviaryUpgradesButton.addEventListener("click", function () {
      activeUpgradesMode = "aviary";
      renderUpgradesOverview();
    });

    updateCoinsFromElapsedTime(gameState, Date.now());
    renderTopBar(topBar, gameState);
    initButtonAudio();
    startIncomeSystem(gameState, function () {
      renderTopBar(topBar, gameState);
      refreshAviarySummary();
    });
    renderEarthworksNav();
    refreshAviarySummary();
    renderOverview();
    renderUpgradesOverview();
    renderHabitatPanel("City Living", cityLivingBirdList);
    renderHabitatPanel("Urban Waters", urbanWatersBirdList);
  </script>
</body>
</html>
