<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flockmaster Bird Catching</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --action-panel-bg: #8fbc7a;
    }

    body {
      background-color: #b8b8b8;
      font-family: "Trebuchet MS", "Segoe UI", Verdana, sans-serif;
      margin: 0;
      color: #1f2a36;
    }

    .top-bar {
      background: #2c3e50;
      color: #f7f1e6;
      padding: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      box-sizing: border-box;
    }

    .top-bar-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .top-bar-link {
      color: #f7f1e6;
      text-decoration: none;
      cursor: pointer;
    }

    .top-bar-tooltip {
      position: relative;
      display: inline-block;
      cursor: default;
    }

    .top-bar-tooltip-box {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #f7f1e6;
      color: #1f2a36;
      border: 2px solid black;
      border-radius: 10px;
      padding: 8px 12px;
      white-space: nowrap;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
      letter-spacing: 0;
    }

    .top-bar-tooltip:hover .top-bar-tooltip-box {
      visibility: visible;
      opacity: 1;
    }

    .page-title {
      color: #2c3e50;
      letter-spacing: 2px;
      margin: 28px 0 8px;
      text-align: center;
      text-shadow: 1px 1px 0 #d9d9d9;
    }

    .page-layout {
      display: flex;
      gap: 28px;
      padding: 24px 32px 40px;
      align-items: flex-start;
      box-sizing: border-box;
    }

    .catching-sidebar {
      width: 40%;
    }

    .catching-panels {
      width: 60%;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .catching-panel {
      width: 100%;
      min-height: 360px;
    }

    .catching-panel.is-collapsed {
      min-height: 120px;
    }

    .card {
      background: #f7f1e6;
      border: 2px solid black;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 22px;
      box-sizing: border-box;
    }

    .card h2 {
      margin-top: 0;
      color: #2c3e50;
    }

    .card-content.is-hidden {
      display: none;
    }

    .menu-button {
      display: inline-block;
      background: #2c3e50;
      color: #f7f1e6;
      text-decoration: none;
      padding: 12px 18px;
      border: 2px solid black;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 12px;
      margin-bottom: 12px;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 16px;
    }

    .panel-header {
      margin-top: 0;
      color: #17311e;
      letter-spacing: 1px;
    }

    .panel-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .panel-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .panel-tab-tooltip {
      position: relative;
      display: inline-block;
    }

    .panel-tab-button {
      display: inline-block;
      background: #2c3e50;
      color: #f7f1e6;
      border: 2px solid black;
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: bold;
      font-family: inherit;
      font-size: 15px;
      cursor: pointer;
    }

    .panel-tab-button.is-active {
      background: #17311e;
    }

    .panel-tab-button.is-locked {
      background: #6f7780;
      color: #d7dde4;
    }

    .panel-tab-tooltip-box {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: #f7f1e6;
      color: #1f2a36;
      border: 2px solid black;
      border-radius: 10px;
      padding: 8px 12px;
      white-space: nowrap;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
    }

    .panel-tab-tooltip:hover .panel-tab-tooltip-box,
    .panel-tab-tooltip.is-open .panel-tab-tooltip-box {
      visibility: visible;
      opacity: 1;
    }

    .trap-panel-content {
      min-height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }

    .catching-panel.is-collapsed .trap-panel-content {
      min-height: 0;
      display: block;
    }

    .panel-note {
      font-size: 18px;
      color: #17311e;
      margin-bottom: 20px;
    }

    .panel-subtitle {
      margin: 0 0 10px;
      font-size: 24px;
      color: #2c3e50;
    }

    .panel-subtitle-small {
      margin: -4px 0 14px;
      font-size: 18px;
      color: #4a4a4a;
      font-weight: bold;
    }

    .loggerhead-request-line {
      margin: 0 0 10px;
      font-size: 18px;
      color: #17311e;
      text-align: center;
    }

    .reintroduction-quest-title {
      margin: 0 0 14px;
      font-size: 24px;
      color: #17311e;
      text-align: center;
    }

    .reintroduction-bird-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      width: 100%;
      margin: 0 0 18px;
    }

    .reintroduction-bird-card {
      background: rgba(247, 241, 230, 0.55);
      border: 2px solid rgba(44, 62, 80, 0.3);
      border-radius: 16px;
      padding: 12px;
      box-sizing: border-box;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }

    .reintroduction-bird-card:hover,
    .reintroduction-bird-card:focus-visible {
      border-color: #17311e;
      box-shadow: 0 4px 12px rgba(23, 49, 30, 0.16);
      transform: translateY(-1px);
      outline: none;
    }

    .reintroduction-bird-card.is-selected {
      border-color: #b8860b;
      box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.22);
    }

    .reintroduction-bird-card.is-complete {
      opacity: 0.68;
      cursor: default;
    }

    .reintroduction-bird-card.is-complete:hover,
    .reintroduction-bird-card.is-complete:focus-visible {
      border-color: rgba(44, 62, 80, 0.3);
      box-shadow: none;
      transform: none;
    }

    .reintroduction-bird-card img {
      width: 100%;
      max-width: 140px;
      height: 120px;
      object-fit: contain;
      display: block;
      margin: 0 auto 10px;
    }

    .reintroduction-bird-name {
      margin: 0 0 6px;
      font-weight: bold;
      color: #17311e;
    }

    .reintroduction-bird-count {
      margin: 0;
      color: #2c3e50;
      font-weight: bold;
    }

    .reintroduction-preview {
      margin: 0 0 18px;
      color: #2c3e50;
      font-weight: bold;
      text-align: center;
    }

    .mouse-intro-overlay {
      position: fixed;
      inset: 0;
      background: rgba(31, 42, 54, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      z-index: 260;
    }

    .mouse-intro-overlay.is-visible {
      display: flex;
    }

    .mouse-intro-card {
      width: min(540px, 100%);
      background: #f7f1e6;
      border: 3px solid black;
      border-radius: 18px;
      padding: 22px;
      box-sizing: border-box;
      text-align: center;
    }

    .mouse-intro-card p {
      margin: 0 0 16px;
      color: #2c3e50;
      font-weight: bold;
    }

    .trap-image {
      width: 100%;
      max-width: 760px;
      max-height: 420px;
      margin-bottom: 24px;
    }

      .loggerhead-image {
        width: 100%;
        max-width: 560px;
        height: auto;
        max-height: 320px;
        margin-bottom: 20px;
        object-fit: contain;
        display: block;
        margin-left: auto;
        margin-right: auto;
        cursor: pointer;
      }

    .ritual-image-stack {
      position: relative;
      width: 100%;
      max-width: 560px;
      margin: 0 auto 20px;
    }

    .ritual-image-stack .loggerhead-image {
      display: block;
      margin: 0 auto;
    }

    .ritual-catch-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .ritual-catch-overlay img {
      max-width: 62%;
      max-height: 70%;
      object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(31, 42, 54, 0.45));
    }

    .upgrade-tooltip {
      position: relative;
      display: inline-block;
    }

    .upgrade-tooltip > .menu-button {
      width: 100%;
      margin-right: 0;
      text-align: center;
      box-sizing: border-box;
    }

    .upgrade-tooltip-box {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      background: #f7f1e6;
      color: #1f2a36;
      border: 2px solid black;
      border-radius: 10px;
      padding: 8px 12px;
      white-space: nowrap;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
    }

    .upgrade-tooltip:hover .upgrade-tooltip-box {
      visibility: visible;
      opacity: 1;
    }

    .upgrade-section-title {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: bold;
      color: #2c3e50;
    }

    .upgrade-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 14px;
      align-items: start;
    }

    .upgrade-row.upgrade-row-three {
      grid-template-columns: repeat(3, 1fr);
    }

    .upgrade-entry {
      width: 100%;
    }

    .storage-upgrade-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 18px;
      align-items: start;
    }

    .nav-tooltip {
      position: relative;
      display: inline-block;
    }

    .nav-tooltip-box {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      background: #f7f1e6;
      color: #1f2a36;
      border: 2px solid black;
      border-radius: 10px;
      padding: 8px 12px;
      white-space: nowrap;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
    }

    .nav-tooltip:hover .nav-tooltip-box {
      visibility: visible;
      opacity: 1;
    }

    .menu-button.is-locked {
      background: #6f7780;
      color: #d7dde4;
      cursor: default;
      pointer-events: none;
    }

    .nav-card {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
      gap: 12px;
    }

    .nav-card .menu-button,
    .nav-card .nav-tooltip {
      width: 100%;
      margin: 0;
      box-sizing: border-box;
    }

    .nav-card .menu-button {
      text-align: center;
      white-space: nowrap;
    }

    .nav-card .nav-tooltip {
      display: block;
    }

    .nav-card .nav-tooltip-box {
      left: 50%;
      transform: translateX(-50%);
    }

    .shop-row {
      display: inline-block;
      vertical-align: top;
      margin-right: 12px;
      margin-bottom: 12px;
    }

    .shop-count {
      margin: 0 0 14px;
      color: #2c3e50;
      font-weight: bold;
      text-align: center;
    }

    .trap-bait-row {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .trap-bait-label {
      margin: 0;
      font-size: 18px;
      font-weight: bold;
      color: #17311e;
      flex: 0 0 auto;
      text-align: left;
    }

    .trap-bait-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-start;
    }

    .trap-bait-actions .menu-button {
      margin-right: 0;
      margin-bottom: 0;
    }

    .shop-max {
      margin: -8px 0 14px;
      color: #2c3e50;
      font-weight: bold;
      text-align: center;
    }

    .shop-divider {
      width: 100%;
      margin: 8px 0 14px;
      padding-top: 14px;
      border-top: 1px solid #b9b2a8;
    }

    .upgrade-divider {
      margin: 16px 0 18px;
      padding-top: 16px;
      border-top: 1px solid #b9b2a8;
    }

    .catch-overlay {
      position: fixed;
      inset: 0;
      background: rgba(31, 42, 54, 0.88);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 24px;
      box-sizing: border-box;
    }

    .catch-overlay.is-visible {
      display: flex;
    }

    .catch-overlay-card {
      background: #f7f1e6;
      border: 3px solid black;
      border-radius: 24px;
      padding: 28px;
      max-width: 760px;
      width: 100%;
      text-align: center;
    }

    .catch-overlay-title {
      margin-top: 0;
      color: #2c3e50;
      letter-spacing: 1px;
    }

    .catch-overlay-image {
      max-width: 100%;
      max-height: 360px;
      margin: 16px auto 20px;
      display: block;
    }

    .catch-overlay-text {
      font-size: 28px;
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 24px;
    }
  </style>
</head>

<body>
  <div class="top-bar" id="topBar"></div>

  <div class="catch-overlay" id="catchOverlay">
    <div class="catch-overlay-card">
      <h2 class="catch-overlay-title">NEW BIRD CAUGHT</h2>
      <img class="catch-overlay-image" id="catchOverlayImage" alt="">
      <p class="catch-overlay-text" id="catchOverlayText"></p>
      <button class="menu-button" type="button" id="catchOverlayClose">Continue</button>
    </div>
  </div>

  <h1 class="page-title">BIRD CATCHING</h1>

  <div class="page-layout">
      <div class="catching-sidebar">
        <div class="card nav-card">
          <a class="menu-button" href="index.html">Home</a>
          <a class="menu-button" href="aviary.html">Aviary</a>
          <span class="nav-tooltip" id="earthworksNavWrapper"></span>
          <span class="nav-tooltip" id="dockyardNavWrapper"></span>
          <a class="menu-button" href="speciesUpgrades.html">Species Upgrades</a>
        </div>

      <div class="card" id="upgradesCard">
        <div class="panel-header-row">
          <h2>Upgrades</h2>
          <div class="panel-controls">
            <button class="panel-tab-button is-active" id="upgradesMinimizeButton" type="button">Minimize</button>
            <button class="panel-tab-button" id="upgradesExpandButton" type="button">Expand</button>
          </div>
        </div>
        <div class="card-content is-hidden" id="upgradesList"></div>
      </div>
    </div>

    <div class="catching-panels">
      <div class="catching-panel action-panel" id="trapPanelShell">
          <div class="panel-header-row">
            <h2 class="panel-header">Catching</h2>
            <div class="panel-controls" id="trapPanelControls"></div>
          </div>
        <div class="trap-panel-content" id="trapPanelContent"></div>
      </div>

      <div class="catching-panel action-panel" id="loggerheadPanelShell">
        <div class="panel-header-row">
          <h2 class="panel-header">The Loggerhead</h2>
          <div class="panel-controls" id="loggerheadPanelControls"></div>
        </div>
        <div class="trap-panel-content" id="loggerheadPanelContent"></div>
      </div>

      <div class="catching-panel action-panel" id="natureProgramsPanelShell">
        <div class="panel-header-row">
          <h2 class="panel-header">Nature Programs</h2>
          <div class="panel-controls" id="natureProgramsPanelControls"></div>
        </div>
        <div class="trap-panel-content" id="natureProgramsPanelContent"></div>
      </div>
    </div>
  </div>

  <div class="mouse-intro-overlay" id="mouseIntroOverlay">
    <div class="mouse-intro-card">
      <p>Some birds can only be acquired with feeder mice. You will always catch a bird when using mice. Catch rates for unacquired species are greatly improved.</p>
      <button class="menu-button" id="closeMouseIntroButton" type="button">Got It</button>
    </div>
  </div>

  <script src="birds.js"></script>
  <script src="abilities.js"></script>
  <script src="upgrades.js"></script>
  <script src="speciesUpgrades.js"></script>
  <script src="items.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="game.js"></script>
  <script>
    // Cache page state and the main UI elements this screen updates.
    const gameState = loadGameState();
    initCloudSaveForCurrentPage(gameState, { reloadOnRemoteLoad: true });
    const topBar = document.querySelector("#topBar");
    const upgradesList = document.querySelector("#upgradesList");
    const upgradesMinimizeButton = document.querySelector("#upgradesMinimizeButton");
    const upgradesExpandButton = document.querySelector("#upgradesExpandButton");
    const trapPanelShell = document.querySelector("#trapPanelShell");
    const trapPanelControls = document.querySelector("#trapPanelControls");
    const trapPanelContent = document.querySelector("#trapPanelContent");
    const loggerheadPanelShell = document.querySelector("#loggerheadPanelShell");
    const loggerheadPanelControls = document.querySelector("#loggerheadPanelControls");
    const loggerheadPanelContent = document.querySelector("#loggerheadPanelContent");
    const natureProgramsPanelShell = document.querySelector("#natureProgramsPanelShell");
    const natureProgramsPanelControls = document.querySelector("#natureProgramsPanelControls");
    const natureProgramsPanelContent = document.querySelector("#natureProgramsPanelContent");
    const catchOverlay = document.querySelector("#catchOverlay");
    const catchOverlayImage = document.querySelector("#catchOverlayImage");
    const catchOverlayText = document.querySelector("#catchOverlayText");
    const catchOverlayClose = document.querySelector("#catchOverlayClose");
    const earthworksNavWrapper = document.querySelector("#earthworksNavWrapper");
    const dockyardNavWrapper = document.querySelector("#dockyardNavWrapper");
    const mouseIntroOverlay = document.querySelector("#mouseIntroOverlay");
    const closeMouseIntroButton = document.querySelector("#closeMouseIntroButton");
    const shrikeSound = new Audio("/Resources/Calls/shrike.mp3");
    const sacrificeCompleteSound = new Audio("/Resources/Sound%20Effects/sacrificeComplete.wav");
    const LOGGERHEAD_REQUESTS = [
        {
          costs: [
            { birdId: "pigeon", amount: 10 },
            { birdId: "nuthatch", amount: 5 }
          ],
          rewardMice: 1
        },
      {
        costs: [
          { birdId: "kestrel", amount: 5 },
          { birdId: "bluejay", amount: 5 },
          { birdId: "cardinal", amount: 3 },
          { birdId: "mourningdove", amount: 5 },
          { birdId: "pileatedwoodpecker", amount: 2 }
        ],
        rewardMice: 2,
        rewardItems: {
          voyageticket: 2
        },
        rewardResources: {
          seeds: 50000
        }
      }
    ];
    const REINTRODUCTION_REQUESTS = [
      {
        name: "Waterfowl Wave",
        costs: [
          { birdId: "goose", amount: 5 },
          { birdId: "mallard", amount: 5 }
        ],
        rewardItems: {
          coinhourticket: 2
        }
      },
      {
        name: "Shorebird Sayonara",
        costs: [
          { birdId: "killdeer", amount: 5 },
          { birdId: "sandpiper", amount: 5 }
        ]
      },
        {
          name: "Feathered Farewell",
          costs: [
            { birdId: "muteswan", amount: 2 },
            { birdId: "cardinal", amount: 4 }
          ]
        },
        {
          name: "Avian Au Revoir",
          costs: [
            { birdId: "kestrel", amount: 5 },
            { birdId: "grebe", amount: 10 }
          ]
        },
        {
          name: "Castaway Corvids",
          costs: [
            { birdId: "bluejay", amount: 5 },
            { birdId: "crow", amount: 10 }
          ]
        }
      ];
      let activeTrapPanelMode = gameState.trapPurchased ? "trap" : "minimize";
      let activeLoggerheadMode = "minimize";
      let activeNatureProgramsMode = "minimize";
      let activeUpgradeCardMode = "expand";
      let selectedReintroductionBirdId = null;

      function syncGyrfalconUnlockState() {
        if (!gameState.gyrfalconUnlocked && getBirdCountById(gameState, "ptarmigan") > 0) {
          gameState.gyrfalconUnlocked = true;
          saveGameState(gameState);
        }

        if (!gameState.gyrfalconCompleted && getBirdCountById(gameState, "gyrfalcon") > 0) {
          gameState.gyrfalconCompleted = true;
          gameState.gyrfalconReadyToCollect = false;
          gameState.gyrfalconLastResult = "";
          saveGameState(gameState);
        }
      }

      function isGyrfalconUnlocked() {
        return gameState.gyrfalconUnlocked === true;
      }

      function isGyrfalconCompleted() {
        return gameState.gyrfalconCompleted === true || getBirdCountById(gameState, "gyrfalcon") > 0;
      }

      function getGyrfalconSuccessChance() {
        return 0.01 + (gameState.gyrfalconReleaseCount * 0.001);
      }

    function getLoggerheadCurrentRequest() {
      return LOGGERHEAD_REQUESTS[gameState.loggerheadQuestIndex] || null;
    }

    function isLoggerheadUnlocked() {
      return getTotalBirdCount(gameState) >= 50 || gameState.loggerheadShowingBird || getLoggerheadCurrentRequest() === null;
    }

    function isLoggerheadSpendMiceUnlocked() {
      return gameState.loggerheadQuestIndex >= 1;
    }

    function isReintroductionUnlocked() {
      return gameState.reintroductionUnlocked === true;
    }

    function getCurrentReintroductionRequest() {
      return REINTRODUCTION_REQUESTS[gameState.reintroductionQuestIndex] || null;
    }

    function canStartNextReintroductionQuest() {
      return getEffectiveBaitCostDietIndividualCount(gameState, "seeds") > 50;
    }

    function canCompleteReintroductionRequest(request) {
      if (!request) {
        return false;
      }

      return request.costs.every(function (costEntry) {
        return getBirdCountById(gameState, costEntry.birdId) >= costEntry.amount;
      });
    }

    function getReintroductionPreviewLines(costEntry) {
      const bird = getBirdById(gameState, costEntry.birdId);

      if (!bird) {
        return [];
      }

      const amount = costEntry.amount;
      const previewLines = [];
      const visitorLoss = getBirdVisitorRatePerDay(bird, gameState) * amount;
      const seedLoss = getBirdSeedRatePerMinute(bird, gameState) * amount;
      const twigLoss = getBirdTwigRatePerMinute(bird, gameState) * amount;
      const grubLoss = getBirdGrubRatePerMinute(bird, gameState) * amount;

      if (visitorLoss > 0) {
        previewLines.push("-" + formatRateValue(visitorLoss) + " visitors/day");
      }

      if (seedLoss > 0) {
        previewLines.push("-" + formatRateValue(seedLoss) + " seeds/min");
      }

      if (twigLoss > 0) {
        previewLines.push("-" + formatRateValue(twigLoss) + " twigs/min");
      }

      if (grubLoss > 0) {
        previewLines.push("-" + formatRateValue(grubLoss) + " grubs/min");
      }

      if (birdMatchesBaitType(bird, "seeds")) {
        previewLines.push("Seed bait -> " + formatLargeNumber(Math.round(getProjectedTrapSeedCost(gameState, costEntry.birdId, amount))));
      }

      if (birdMatchesBaitType(bird, "grubs")) {
        previewLines.push("Grub bait -> " + formatLargeNumber(Math.round(getProjectedTrapGrubCost(gameState, costEntry.birdId, amount))));
      }

      previewLines.push("+" + formatLargeNumber(amount) + " Feathers");

      return previewLines;
    }

    function canCompleteLoggerheadRequest(request) {
      if (!request) {
        return false;
      }

      return request.costs.every(function (costEntry) {
        return getBirdCountById(gameState, costEntry.birdId) >= costEntry.amount;
      });
    }

    // Keep the left-side upgrade controls visually in sync.
    function setActiveUpgradeCardButton() {
      upgradesMinimizeButton.classList.toggle("is-active", activeUpgradeCardMode === "minimize");
      upgradesExpandButton.classList.toggle("is-active", activeUpgradeCardMode === "expand");
      upgradesList.classList.toggle("is-hidden", activeUpgradeCardMode !== "expand");
    }

    function formatLoggerheadCostText(request) {
      return request.costs.map(function (costEntry) {
        const costBird = getBirdById(gameState, costEntry.birdId);
        return formatLargeNumber(costEntry.amount) + " " + (costBird ? costBird.species : costEntry.birdId);
      }).join(" | ");
    }

    function formatLoggerheadRewardText(request) {
      const rewardParts = [];

      if (request.rewardMice > 0) {
        rewardParts.push(formatLargeNumber(request.rewardMice) + " Feeder Mice");
      }

      if (request.rewardItems && typeof request.rewardItems === "object") {
        Object.keys(request.rewardItems).forEach(function (itemId) {
          const itemDefinition = getItemById(itemId);
          const rewardAmount = request.rewardItems[itemId];

          if (rewardAmount > 0 && itemDefinition) {
            rewardParts.push(formatLargeNumber(rewardAmount) + " " + itemDefinition.name);
          }
        });
      }

      if (request.rewardResources && typeof request.rewardResources === "object") {
        Object.keys(request.rewardResources).forEach(function (resourceKey) {
          const rewardAmount = request.rewardResources[resourceKey];

          if (rewardAmount > 0) {
            rewardParts.push(
              formatLargeNumber(rewardAmount) + " " + resourceKey.charAt(0).toUpperCase() + resourceKey.slice(1)
            );
          }
        });
      }

      return rewardParts.join(" | ");
    }

    // Build one right-side panel tab button with optional locked tooltip behavior.
    function createPanelTabControl(config) {
      const tooltipWrapper = document.createElement("div");
      tooltipWrapper.className = "panel-tab-tooltip";

      const button = document.createElement("button");
      button.className = "panel-tab-button";
      button.type = "button";
      button.dataset.requiresSuccess = "true";
      button.textContent = config.label;

      if (config.isActive) {
        button.classList.add("is-active");
      }

      if (config.isLocked) {
        button.classList.add("is-locked");
      }

      button.addEventListener("click", function (event) {
        event.stopPropagation();

        if (config.isLocked) {
          tooltipWrapper.classList.toggle("is-open");
          return;
        }

        document.querySelectorAll(".panel-tab-tooltip.is-open").forEach(function (openTooltip) {
          if (openTooltip !== tooltipWrapper) {
            openTooltip.classList.remove("is-open");
          }
        });

        if (typeof config.onActivate === "function") {
          config.onActivate();
        }

        playButtonSound();
      });

      tooltipWrapper.appendChild(button);

      if (config.isLocked && config.tooltipText) {
        const tooltipBox = document.createElement("div");
        tooltipBox.className = "panel-tab-tooltip-box";
        tooltipBox.textContent = config.tooltipText;
        tooltipWrapper.appendChild(tooltipBox);
      }

      return tooltipWrapper;
    }

    // Build a one-time bedding upgrade row with requirements and tooltip text.
    function createBeddingUpgradeButton(config) {
      const upgradeDefinition = getUpgradeDefinition(config.upgradeId);

      if (!upgradeDefinition) {
        return document.createComment("Missing upgrade definition: " + config.upgradeId);
      }

      const wrapper = document.createElement("div");
      wrapper.className = "upgrade-entry";

      const tooltipWrapper = document.createElement("div");
      tooltipWrapper.className = "upgrade-tooltip";
      tooltipWrapper.style.display = "block";

      const button = document.createElement("button");
      button.className = "menu-button";
      button.type = "button";
      button.style.width = "100%";
      button.style.marginRight = "0";
      const costSummary = getUpgradeCostSummary(upgradeDefinition);
      button.textContent = hasUpgrade(gameState, config.upgradeId)
        ? upgradeDefinition.name + " (Owned)"
        : (costSummary ? (upgradeDefinition.name + " (" + costSummary + ")") : upgradeDefinition.name);
      syncOwnedUpgradeButtonState(button, gameState, config.upgradeId);

      button.addEventListener("click", function () {
        handleUpgradePurchaseRequest(gameState, config.upgradeId, {
          beforePurchase: function () {
            updateCoinsFromElapsedTime(gameState, Date.now());
          },
          onSuccess: function () {
            renderTopBar(topBar, gameState);
            renderUpgrades();
          }
        });
      });

      const tooltipBox = document.createElement("div");
      tooltipBox.className = "upgrade-tooltip-box";
      tooltipBox.textContent = upgradeDefinition.description;

      const requirementLine = document.createElement("p");
      requirementLine.className = "shop-count";
      const requirementSummary = getUpgradeRequirementSummary(gameState, upgradeDefinition);
      requirementLine.textContent = requirementSummary ? ("Requires: " + requirementSummary) : "";

      tooltipWrapper.appendChild(button);
      tooltipWrapper.appendChild(tooltipBox);
      wrapper.appendChild(tooltipWrapper);
      if (requirementSummary) {
        wrapper.appendChild(requirementLine);
      }

      return wrapper;
    }

    function renderSaplingShop() {}

    // Rebuild the trap panel based on the active tab and the trap's current step.
      function renderTrapPanel() {
        syncGyrfalconUnlockState();
        trapPanelControls.innerHTML = "";
        trapPanelContent.innerHTML = "";
        trapPanelShell.classList.toggle("is-collapsed", activeTrapPanelMode === "minimize");

        if (activeTrapPanelMode === "gyrfalcon" && isGyrfalconCompleted()) {
          activeTrapPanelMode = gameState.trapPurchased ? "trap" : "minimize";
        }

        trapPanelControls.appendChild(createPanelTabControl({
          label: "Minimize",
        isActive: activeTrapPanelMode === "minimize",
        isLocked: false,
        onActivate: function () {
          activeTrapPanelMode = "minimize";
          renderTrapPanel();
        }
      }));

        trapPanelControls.appendChild(createPanelTabControl({
          label: "Trap",
          isActive: activeTrapPanelMode === "trap",
        isLocked: !gameState.trapPurchased,
        tooltipText: "Purchase Buy Trap in Upgrades to unlock",
        onActivate: function () {
          activeTrapPanelMode = "trap";
          renderTrapPanel();
          }
        }));

        if (isGyrfalconUnlocked() && !isGyrfalconCompleted()) {
          trapPanelControls.appendChild(createPanelTabControl({
            label: "Gyrfalcon",
            isActive: activeTrapPanelMode === "gyrfalcon",
            isLocked: false,
            onActivate: function () {
              activeTrapPanelMode = "gyrfalcon";
              renderTrapPanel();
            }
          }));
        }

        if (activeTrapPanelMode === "minimize") {
          return;
        }

        if (activeTrapPanelMode === "gyrfalcon") {
          const gyrfalconNote = document.createElement("p");
          gyrfalconNote.className = "panel-note";
          gyrfalconNote.textContent = "Release Rock Ptarmigans to try and catch the legendary Gyrfalcon";

          const gyrfalconRateLine = document.createElement("p");
          gyrfalconRateLine.className = "panel-subtitle-small";
          gyrfalconRateLine.textContent = "Current rate of success: " + (getGyrfalconSuccessChance() * 100).toFixed(1) + "%";

          const gyrfalconBirdImage = document.createElement("img");
          gyrfalconBirdImage.className = "loggerhead-image";
          gyrfalconBirdImage.src = gameState.gyrfalconReadyToCollect
            ? "/Resources/Bird Images/gyrfalcon.png"
            : "/Resources/Bird Images/ptarmigan.png";
          gyrfalconBirdImage.alt = gameState.gyrfalconReadyToCollect ? "Gyrfalcon" : "Rock Ptarmigan";

          const gyrfalconStatus = document.createElement("p");
          gyrfalconStatus.className = "loggerhead-request-line";
          gyrfalconStatus.textContent = gameState.gyrfalconReadyToCollect
            ? "Success: the Gyrfalcon is ready to join your flock"
            : "Rock Ptarmigans in flock: " + formatLargeNumber(getBirdCountById(gameState, "ptarmigan"));

          const gyrfalconActionButton = document.createElement("button");
          gyrfalconActionButton.className = "menu-button";
          gyrfalconActionButton.type = "button";
          gyrfalconActionButton.dataset.requiresSuccess = "true";

          if (gameState.gyrfalconReadyToCollect) {
            gyrfalconActionButton.textContent = "Collect";
          } else if (gameState.gyrfalconLastResult === "failure") {
            gyrfalconActionButton.textContent = "No Luck, Try Again";
          } else {
            gyrfalconActionButton.textContent = "Release";
          }

          if (!gameState.gyrfalconReadyToCollect && getBirdCountById(gameState, "ptarmigan") < 1) {
            gyrfalconActionButton.classList.add("is-locked");
            gyrfalconActionButton.disabled = true;
          }

          gyrfalconActionButton.addEventListener("click", function () {
            if (gameState.gyrfalconReadyToCollect) {
              const gyrfalconBird = getBirdById(gameState, "gyrfalcon");
              if (!gyrfalconBird) {
                return;
              }

              addBirdToFlock(gameState, gyrfalconBird, { isCatch: true });
              gameState.gyrfalconCompleted = true;
              gameState.gyrfalconReadyToCollect = false;
              gameState.gyrfalconLastResult = "";
              activeTrapPanelMode = gameState.trapPurchased ? "trap" : "minimize";
              playButtonSound();
              saveGameState(gameState);
              renderTopBar(topBar, gameState);
              renderEarthworksNav();
              renderDockyardNav();
              renderActionPanels();
              showCaughtBirdOverlay(gyrfalconBird);
              return;
            }

            if (getBirdCountById(gameState, "ptarmigan") < 1) {
              return;
            }

            removeBirdsFromFlock(gameState, "ptarmigan", 1);
            const successChance = getGyrfalconSuccessChance();
            gameState.gyrfalconReleaseCount += 1;

            if (Math.random() < successChance) {
              gameState.gyrfalconReadyToCollect = true;
              gameState.gyrfalconLastResult = "success";
            } else {
              gameState.gyrfalconReadyToCollect = false;
              gameState.gyrfalconLastResult = "failure";
            }

            playButtonSound();
            saveGameState(gameState);
            renderTopBar(topBar, gameState);
            renderEarthworksNav();
            renderDockyardNav();
            renderActionPanels();
          });

          trapPanelContent.appendChild(gyrfalconNote);
          trapPanelContent.appendChild(gyrfalconRateLine);
          trapPanelContent.appendChild(gyrfalconBirdImage);
          trapPanelContent.appendChild(gyrfalconStatus);
          trapPanelContent.appendChild(gyrfalconActionButton);
          return;
        }

        if (!gameState.trapPurchased) {
          return;
        }

        // The note and image always reflect the trap's current step so the panel
        // can swap between baiting, waiting, and resolution without separate views.
      const trapNote = document.createElement("p");
      trapNote.className = "panel-note";
      if (gameState.trapPulled) {
        trapNote.textContent = "The trap has been pulled";
      } else if (gameState.trapLoaded) {
        trapNote.textContent = "Your trap is loaded with " + gameState.trapBaitType + " and ready";
      } else if (gameState.lastTrapResult) {
        trapNote.textContent = gameState.lastTrapResult;
      } else {
        trapNote.textContent = "Your trap is ready to be baited";
      }

      const trapSubtitle = document.createElement("p");
      trapSubtitle.className = "panel-subtitle-small";
      trapSubtitle.textContent = "Seed and grub bait cost scales with how many birds of that diet are in your flock";

      const trapImage = document.createElement("img");
      trapImage.className = "trap-image";
      if (gameState.trapPulled) {
        trapImage.src = "/Resources/Misc%20Images/pulledTrap.png";
        trapImage.alt = "Pulled bird trap";
      } else if (gameState.trapLoaded) {
        if (gameState.trapBaitType === "grubs") {
          trapImage.src = "/Resources/Misc%20Images/loadedTrapGrubs.png";
          trapImage.alt = "Loaded bird trap with grub bait";
        } else if (gameState.trapBaitType === "fish") {
          trapImage.src = "/Resources/Misc%20Images/loadedTrapFish.png";
          trapImage.alt = "Loaded bird trap with fish bait";
        } else {
          trapImage.src = "/Resources/Misc%20Images/loadedTrap.png";
          trapImage.alt = "Loaded bird trap with seed bait";
        }
      } else {
        trapImage.src = "/Resources/Misc%20Images/unloadedTrap.png";
        trapImage.alt = "Unloaded bird trap";
      }

      trapPanelContent.appendChild(trapImage);
      trapPanelContent.appendChild(trapNote);
      trapPanelContent.appendChild(trapSubtitle);

      if (gameState.trapPulled) {
        // A pulled trap only needs one action: resolve the catch against the
        // currently loaded bait pool and then reset the trap state.
        const checkTrapButton = document.createElement("button");
        checkTrapButton.className = "menu-button";
        checkTrapButton.type = "button";
        checkTrapButton.textContent = "Check Trap";

        checkTrapButton.addEventListener("click", function () {
          const catchRoll = Math.random();
          const catchableBirds = getCatchableBirdsByDiet(gameState, gameState.trapBaitType);

          if (catchRoll < getEffectiveCatchRate(gameState, gameState.trapBaitType)) {
            if (catchableBirds.length === 0) {
              gameState.lastTrapResult = "No new birds can be caught in your current habitats";
            } else {
              const caughtBird = getRandomBirdByRarityForGameState(catchableBirds, gameState);
              const birdInFlock = gameState.birds.find(function (bird) {
                return bird.id === caughtBird.id;
              });
              const alreadyOwned = birdInFlock.count > 0;

              addBirdToFlock(gameState, birdInFlock, { isCatch: true });
              handleBirdCaughtFromTrap(gameState, birdInFlock, {
                baitType: gameState.trapBaitType,
                usedSeedTicket: gameState.trapUsedSeedTicket,
                spentSeedCost: gameState.trapSpentSeedCost
              });

              if (alreadyOwned) {
                gameState.lastTrapResult = "You caught another " + caughtBird.species;
              } else {
                gameState.lastTrapResult = "Caught: " + caughtBird.species;
                showCaughtBirdOverlay(caughtBird);
              }
            }
          } else {
            gameState.lastTrapResult = "Trap Empty";
          }

          gameState.trapLoaded = false;
          gameState.trapPulled = false;
          gameState.trapBaitType = null;
          gameState.trapUsedSeedTicket = false;
          gameState.trapSpentSeedCost = 0;
          saveGameState(gameState);
          renderTopBar(topBar, gameState);
          renderEarthworksNav();
          renderDockyardNav();
          renderActionPanels();
        });

        trapPanelContent.appendChild(checkTrapButton);
        return;
      }

      if (!gameState.trapLoaded) {
        let loadTicketTrapButton = null;

        if (getItemCount(gameState, "seedbaitticket") > 0) {
          loadTicketTrapButton = document.createElement("button");
          loadTicketTrapButton.className = "menu-button";
          loadTicketTrapButton.type = "button";
          loadTicketTrapButton.dataset.requiresSuccess = "true";
          loadTicketTrapButton.textContent = "Spend Ticket";

          loadTicketTrapButton.addEventListener("click", function () {
            updateCoinsFromElapsedTime(gameState, Date.now());

            if (!spendItemCount(gameState, "seedbaitticket", 1)) {
              return;
            }

            gameState.trapLoaded = true;
            gameState.trapPulled = false;
            gameState.trapBaitType = "seeds";
            gameState.trapUsedSeedTicket = true;
            gameState.trapSpentSeedCost = 0;
            playButtonSound();
            saveGameState(gameState);
            renderTopBar(topBar, gameState);
            renderActionPanels();
          });
        }

        const seedBaitRow = document.createElement("div");
        seedBaitRow.className = "trap-bait-row";

        const seedBaitLabel = document.createElement("p");
        seedBaitLabel.className = "trap-bait-label";
        seedBaitLabel.textContent = "Load Seed Bait:";

        const seedBaitActions = document.createElement("div");
        seedBaitActions.className = "trap-bait-actions";

        // Seed bait keeps every spending option in one row so normal seeds and
        // ticket items feel like alternate costs for the same action.
        const loadSeedTrapButton = document.createElement("button");
        loadSeedTrapButton.className = "menu-button";
        loadSeedTrapButton.type = "button";
        loadSeedTrapButton.dataset.requiresSuccess = "true";
        const effectiveTrapSeedCost = getEffectiveTrapSeedCost(gameState);
        loadSeedTrapButton.textContent = formatLargeNumber(Math.ceil(effectiveTrapSeedCost)) + " Seeds";

        loadSeedTrapButton.addEventListener("click", function () {
          updateCoinsFromElapsedTime(gameState, Date.now());
          const currentTrapSeedCost = getEffectiveTrapSeedCost(gameState);

          if (gameState.seeds < currentTrapSeedCost) {
            return;
          }

          gameState.seeds -= currentTrapSeedCost;
          gameState.trapLoaded = true;
          gameState.trapPulled = false;
          gameState.trapBaitType = "seeds";
          gameState.trapUsedSeedTicket = false;
          gameState.trapSpentSeedCost = currentTrapSeedCost;
          playButtonSound();
          saveGameState(gameState);
          renderTopBar(topBar, gameState);
            renderActionPanels();
        });

        seedBaitActions.appendChild(loadSeedTrapButton);

        if (loadTicketTrapButton) {
          seedBaitActions.appendChild(loadTicketTrapButton);
        }

        seedBaitRow.appendChild(seedBaitLabel);
        seedBaitRow.appendChild(seedBaitActions);
        trapPanelContent.appendChild(seedBaitRow);

        if (isEarthworksUnlocked(gameState)) {
          const grubBaitRow = document.createElement("div");
          grubBaitRow.className = "trap-bait-row";

          const grubBaitLabel = document.createElement("p");

          fishBaitLabel.className = "trap-bait-label";
          fishBaitLabel.textContent = "Load Fish Bait:";

          const fishBaitActions = document.createElement("div");
          fishBaitActions.className = "trap-bait-actions";

          const loadFishTrapButton = document.createElement("button");
          loadFishTrapButton.className = "menu-button";
          loadFishTrapButton.type = "button";
          loadFishTrapButton.dataset.requiresSuccess = "true";
          loadFishTrapButton.textContent = formatLargeNumber(getEffectiveTrapFishCost(gameState)) + " Fish";

          loadFishTrapButton.addEventListener("click", function () {

            if (gameState.fish < currentTrapFishCost) {
              return;

            gameState.trapLoaded = true;

            playButtonSound();
            saveGameState(gameState);
            renderTopBar(topBar, gameState);
            renderActionPanels();
          });

          fishBaitActions.appendChild(loadFishTrapButton);
          fishBaitRow.appendChild(fishBaitLabel);
          fishBaitRow.appendChild(fishBaitActions);
          trapPanelContent.appendChild(fishBaitRow);
        }
      }

      if (gameState.trapLoaded) {
        // Once bait is loaded, the only remaining step is to spring the trap.
        const initiateProtocolButton = document.createElement("button");
        initiateProtocolButton.className = "menu-button";
        initiateProtocolButton.type = "button";
        initiateProtocolButton.textContent = "Initiate Avian Isolation Protocol";

        initiateProtocolButton.addEventListener("click", function () {
          gameState.trapPulled = true;
          saveGameState(gameState);
          renderActionPanels();
        });

        trapPanelContent.appendChild(initiateProtocolButton);
      }
    }

    // Rebuild The Loggerhead panel and its unlock-gated trade tab.
    function renderLoggerheadPanel() {
      loggerheadPanelControls.innerHTML = "";
      loggerheadPanelContent.innerHTML = "";
      loggerheadPanelShell.querySelector(".panel-header").textContent =
        activeLoggerheadMode === "spendMice" ? "Acquire Birds of Prey" : "The Loggerhead";
      loggerheadPanelShell.classList.toggle("is-collapsed", activeLoggerheadMode === "minimize");

      loggerheadPanelControls.appendChild(createPanelTabControl({
        label: "Minimize",
        isActive: activeLoggerheadMode === "minimize",
        isLocked: false,
        onActivate: function () {
          activeLoggerheadMode = "minimize";
          renderLoggerheadPanel();
        }
      }));

      loggerheadPanelControls.appendChild(createPanelTabControl({
        label: "Trade",
        isActive: activeLoggerheadMode === "trade",
        isLocked: !isLoggerheadUnlocked(),
        tooltipText: "Requires 50 Individuals",
        onActivate: function () {
          activeLoggerheadMode = "trade";
          renderLoggerheadPanel();
        }
      }));

      loggerheadPanelControls.appendChild(createPanelTabControl({
        label: "Spend Mice",
        isActive: activeLoggerheadMode === "spendMice",
        isLocked: !isLoggerheadSpendMiceUnlocked(),
        tooltipText: "Complete a Shrike quest to unlock",
        onActivate: function () {
          activeLoggerheadMode = "spendMice";

          if (!gameState.loggerheadMouseIntroSeen) {
            gameState.loggerheadMouseIntroSeen = true;
            saveGameState(gameState);
            openMouseIntroOverlay();
          }

          renderLoggerheadPanel();
        }
      }));

      if (activeLoggerheadMode === "minimize") {
        return;
      }

      if (activeLoggerheadMode === "trade" && !isLoggerheadUnlocked()) {
        return;
      }

      if (activeLoggerheadMode === "spendMice" && !isLoggerheadSpendMiceUnlocked()) {
        return;
      }

      if (activeLoggerheadMode === "spendMice") {
        // The mice ritual is a three-step flow:
        // 1. load a mouse
        // 2. commence to roll the species
        // 3. tame to actually add that rolled bird to the flock
        const ritualTitle = document.createElement("h3");
        ritualTitle.className = "panel-subtitle";
        ritualTitle.textContent = "Use mice wisely";

        const ritualImageStack = document.createElement("div");
        ritualImageStack.className = "ritual-image-stack";

        const ritualImage = document.createElement("img");
        ritualImage.className = "loggerhead-image";
        ritualImage.src = gameState.loggerheadMouseLoaded
          ? "/Resources/Misc%20Images/ritualMouse.png"
          : "/Resources/Misc%20Images/ritualEmpty.png";
        ritualImage.alt = "Mouse ritual";
        ritualImageStack.appendChild(ritualImage);

        const pendingMouseBird = gameState.loggerheadMousePendingBirdId
          ? getBirdById(gameState, gameState.loggerheadMousePendingBirdId)
          : null;

        if (pendingMouseBird) {
          const ritualCatchOverlay = document.createElement("div");
          ritualCatchOverlay.className = "ritual-catch-overlay";

          const pendingBirdImage = document.createElement("img");
          pendingBirdImage.src = getBirdPrimaryImage(pendingMouseBird);
          pendingBirdImage.alt = pendingMouseBird.species;

          ritualCatchOverlay.appendChild(pendingBirdImage);
          ritualImageStack.appendChild(ritualCatchOverlay);
        }

        const ritualResultLine = document.createElement("p");
        ritualResultLine.className = "loggerhead-request-line";
        ritualResultLine.textContent = gameState.loggerheadMouseResult || "Awaiting offering";

        const ritualActionButton = document.createElement("button");
        ritualActionButton.className = "menu-button";
        ritualActionButton.type = "button";
        ritualActionButton.dataset.requiresSuccess = "true";
        ritualActionButton.textContent = pendingMouseBird
          ? "Tame"
          : (gameState.loggerheadMouseLoaded ? "Commence" : "Load Mouse");

        ritualActionButton.addEventListener("click", function () {
          if (pendingMouseBird) {
            // Tame is the commit step so the bird is only added after the
            // player accepts the ritual result.
            const birdInFlock = getBirdById(gameState, pendingMouseBird.id);
            const alreadyOwned = birdInFlock.count > 0;

            addBirdToFlock(gameState, birdInFlock, { isCatch: true });
            gameState.loggerheadMousePendingBirdId = null;
            gameState.loggerheadMouseLoaded = false;
            gameState.loggerheadMouseResult = "Awaiting offering";
            playButtonSound();
            saveGameState(gameState);
            renderTopBar(topBar, gameState);
            renderEarthworksNav();
            renderDockyardNav();
            renderUpgrades();
            renderSaplingShop();
            renderLoggerheadPanel();

            if (!alreadyOwned) {
              showCaughtBirdOverlay(pendingMouseBird);
            }

            return;
          }

          if (!gameState.loggerheadMouseLoaded) {
            if (gameState.mice < 1) {
              return;
            }

            // Loading a mouse spends the resource up front so Commence can be a
            // guaranteed catch instead of another cost-checking step.
            gameState.mice -= 1;
            gameState.loggerheadMouseLoaded = true;
            gameState.loggerheadMousePendingBirdId = null;
            gameState.loggerheadMouseResult = "Mouse prepared";
            playButtonSound();
            saveGameState(gameState);
            renderTopBar(topBar, gameState);
            renderLoggerheadPanel();
            return;
          }

          const caughtBird = getRandomMouseCatchBird(gameState);

          gameState.loggerheadMouseLoaded = false;

          if (!caughtBird) {
            gameState.loggerheadMousePendingBirdId = null;
            gameState.loggerheadMouseResult = "No birds of prey are available yet";
            playButtonSound();
            saveGameState(gameState);
            renderTopBar(topBar, gameState);
            renderLoggerheadPanel();
            return;
          }

          gameState.loggerheadMousePendingBirdId = caughtBird.id;
          gameState.loggerheadMouseResult = "Caught: " + caughtBird.species;
          playButtonSound();
          saveGameState(gameState);
          renderTopBar(topBar, gameState);
          renderLoggerheadPanel();
        });

        loggerheadPanelContent.appendChild(ritualTitle);
        loggerheadPanelContent.appendChild(ritualImageStack);
        loggerheadPanelContent.appendChild(ritualResultLine);
        loggerheadPanelContent.appendChild(ritualActionButton);
        return;
      }

      const currentLoggerheadRequest = getLoggerheadCurrentRequest();
      // The trade tab is intentionally data-driven so later quests only need a
      // new LOGGERHEAD_REQUESTS entry instead of new panel logic.
      const loggerheadTitle = document.createElement("h3");
      loggerheadTitle.className = "panel-subtitle";
      loggerheadTitle.textContent = "Little Prince of Thorns";

      const loggerheadSubtitle = document.createElement("p");
      loggerheadSubtitle.className = "panel-subtitle-small";
      loggerheadSubtitle.textContent = "The Lacerator Gourmand";

      const loggerheadTradeLine = document.createElement("p");
      loggerheadTradeLine.className = "panel-note";
      loggerheadTradeLine.textContent = "Trade Birds for Rewards";

      const loggerheadImage = document.createElement("img");
      loggerheadImage.className = "loggerhead-image";
      loggerheadImage.src = gameState.loggerheadShowingBird
        ? "/Resources/Misc%20Images/shrikeBird.png"
        : "/Resources/Misc%20Images/shrikeRat.png";
      loggerheadImage.alt = "The Loggerhead";
      loggerheadImage.addEventListener("click", function () {
        shrikeSound.currentTime = 0;
        playGameSound(shrikeSound);
      });

      const loggerheadCostLine = document.createElement("p");
      loggerheadCostLine.className = "loggerhead-request-line";

      const loggerheadRewardLine = document.createElement("p");
      loggerheadRewardLine.className = "loggerhead-request-line";

      if (currentLoggerheadRequest) {
        loggerheadCostLine.textContent = "Cost: " + formatLoggerheadCostText(currentLoggerheadRequest);
        loggerheadRewardLine.textContent = "Reward: " + formatLoggerheadRewardText(currentLoggerheadRequest);
      } else {
        loggerheadCostLine.textContent = "No more requests for now";
      }

      const loggerheadSacrificeButton = document.createElement("button");
      loggerheadSacrificeButton.className = "menu-button";
      loggerheadSacrificeButton.type = "button";
      loggerheadSacrificeButton.dataset.requiresSuccess = "true";
      loggerheadSacrificeButton.textContent = gameState.loggerheadShowingBird ? "Collect" : "Sacrifice";
      loggerheadSacrificeButton.disabled = !currentLoggerheadRequest;
      loggerheadSacrificeButton.classList.toggle("is-locked", !currentLoggerheadRequest);
      loggerheadSacrificeButton.addEventListener("click", function () {
        const currentRequest = getLoggerheadCurrentRequest();
        const isCollecting = gameState.loggerheadShowingBird;

        if (!currentRequest) {
          return;
        }

        if (!isCollecting && !canCompleteLoggerheadRequest(currentRequest)) {
          return;
        }

        if (isCollecting) {
          gameState.mice += currentRequest.rewardMice;
          if (currentRequest.rewardItems && typeof currentRequest.rewardItems === "object") {
            Object.keys(currentRequest.rewardItems).forEach(function (itemId) {
              addItemCount(gameState, itemId, currentRequest.rewardItems[itemId]);
            });
          }
          if (currentRequest.rewardResources && typeof currentRequest.rewardResources === "object") {
            Object.keys(currentRequest.rewardResources).forEach(function (resourceKey) {
              if (typeof gameState[resourceKey] === "number") {
                gameState[resourceKey] += currentRequest.rewardResources[resourceKey];
              }
            });
          }
          gameState.loggerheadQuestIndex += 1;
          gameState.shrikeQuestsCompleted += 1;
        } else {
          currentRequest.costs.forEach(function (costEntry) {
            removeBirdsFromFlock(gameState, costEntry.birdId, costEntry.amount);
          });
        }

        gameState.loggerheadShowingBird = !gameState.loggerheadShowingBird;

        if (isCollecting) {
          playButtonSound();
        } else {
          sacrificeCompleteSound.currentTime = 0;
          playGameSound(sacrificeCompleteSound);
        }

        saveGameState(gameState);
        renderTopBar(topBar, gameState);
        renderEarthworksNav();
        renderDockyardNav();
        renderUpgrades();
        renderSaplingShop();
        renderLoggerheadPanel();
      });

      loggerheadPanelContent.appendChild(loggerheadTitle);
      loggerheadPanelContent.appendChild(loggerheadSubtitle);
      loggerheadPanelContent.appendChild(loggerheadTradeLine);
      loggerheadPanelContent.appendChild(loggerheadImage);
      loggerheadPanelContent.appendChild(loggerheadCostLine);
      if (currentLoggerheadRequest) {
        loggerheadPanelContent.appendChild(loggerheadRewardLine);
      }
      loggerheadPanelContent.appendChild(loggerheadSacrificeButton);
    }

    function renderNatureProgramsPanel() {
      if (!gameState.reintroductionUnlocked && getTotalBirdCount(gameState) >= 100) {
        gameState.reintroductionUnlocked = true;
        saveGameState(gameState);
      }

      natureProgramsPanelControls.innerHTML = "";
      natureProgramsPanelContent.innerHTML = "";
      natureProgramsPanelShell.classList.toggle("is-collapsed", activeNatureProgramsMode === "minimize");

      natureProgramsPanelControls.appendChild(createPanelTabControl({
        label: "Minimize",
        isActive: activeNatureProgramsMode === "minimize",
        isLocked: false,
        onActivate: function () {
          activeNatureProgramsMode = "minimize";
          renderNatureProgramsPanel();
        }
      }));

      natureProgramsPanelControls.appendChild(createPanelTabControl({
        label: "Reintroduction",
        isActive: activeNatureProgramsMode === "reintroduction",
        isLocked: !isReintroductionUnlocked(),
        tooltipText: "Unlocks at 100 Individuals",
        onActivate: function () {
          activeNatureProgramsMode = "reintroduction";
          renderNatureProgramsPanel();
        }
      }));

      natureProgramsPanelControls.appendChild(createPanelTabControl({
        label: "Breeding Program",
        isActive: activeNatureProgramsMode === "breedingProgram",
        isLocked: true,
        tooltipText: "Work in Progress",
        onActivate: function () {
          activeNatureProgramsMode = "breedingProgram";
          renderNatureProgramsPanel();
        }
      }));

      if (activeNatureProgramsMode === "minimize") {
        return;
      }

      if (activeNatureProgramsMode === "reintroduction" && !isReintroductionUnlocked()) {
        return;
      }

      const title = document.createElement("h3");
      title.className = "panel-subtitle";
      title.textContent = activeNatureProgramsMode === "reintroduction" ? "Reintroduction" : "Breeding Program";

      if (activeNatureProgramsMode === "reintroduction") {
        const subtitle = document.createElement("p");
        subtitle.className = "panel-subtitle-small";
        subtitle.textContent = "Release birds to reduce the cost of bait, earn Feathers, and collect Coin Tickets";

        natureProgramsPanelContent.appendChild(title);
        natureProgramsPanelContent.appendChild(subtitle);

        const currentRequest = getCurrentReintroductionRequest();

        if (!currentRequest) {
          const completeNote = document.createElement("p");
          completeNote.className = "panel-note";
          completeNote.textContent = "No new quests for now";
          natureProgramsPanelContent.appendChild(completeNote);
          return;
        }

        if (gameState.reintroductionQuestIndex > 0 && !canStartNextReintroductionQuest()) {
          const waitingNote = document.createElement("p");
          waitingNote.className = "panel-note";
          waitingNote.textContent = "Catch More Birds to Receive the Next Quest";
          natureProgramsPanelContent.appendChild(waitingNote);
          return;
        }

        const questTitle = document.createElement("h4");
        questTitle.className = "reintroduction-quest-title";
        questTitle.textContent = currentRequest.name;

        const rewardLine = document.createElement("p");
        rewardLine.className = "loggerhead-request-line";

        if (currentRequest.rewardItems && typeof currentRequest.rewardItems === "object") {
          const rewardParts = Object.keys(currentRequest.rewardItems).map(function (itemId) {
            const itemDefinition = getItemById(itemId);
            const rewardAmount = currentRequest.rewardItems[itemId];
            return itemDefinition && rewardAmount > 0
              ? (formatLargeNumber(rewardAmount) + " " + itemDefinition.name)
              : null;
          }).filter(Boolean);

          if (rewardParts.length > 0) {
            rewardLine.textContent = "Program Reward: " + rewardParts.join(" | ");
          }
        }

        const birdGrid = document.createElement("div");
        birdGrid.className = "reintroduction-bird-grid";
        const availableCosts = currentRequest.costs.slice();

        if (!availableCosts.some(function (costEntry) {
          return costEntry.birdId === selectedReintroductionBirdId;
        })) {
          selectedReintroductionBirdId = availableCosts.length > 0 ? availableCosts[0].birdId : null;
        }

        const activePreviewBirdId = selectedReintroductionBirdId;

        availableCosts.forEach(function (costEntry) {
          const bird = getBirdById(gameState, costEntry.birdId);

          if (!bird) {
            return;
          }

          const birdCard = document.createElement("button");
          birdCard.className = "reintroduction-bird-card";
          birdCard.type = "button";

          if (costEntry.birdId === selectedReintroductionBirdId) {
            birdCard.classList.add("is-selected");
          }

          const birdImage = document.createElement("img");
          birdImage.src = getBirdPrimaryImage(bird);
          birdImage.alt = bird.species;

          const birdName = document.createElement("p");
          birdName.className = "reintroduction-bird-name";
          birdName.textContent = bird.species;

          const birdCount = document.createElement("p");
          birdCount.className = "reintroduction-bird-count";
          birdCount.textContent = "Release " + costEntry.amount;
          const previewLines = getReintroductionPreviewLines(costEntry);
          birdCard.title = "Release " + costEntry.amount + " " + bird.species + ": " + (previewLines.length > 0 ? previewLines.join(" | ") : "No passive output loss");

          birdCard.addEventListener("click", function () {
            selectedReintroductionBirdId = costEntry.birdId;
            renderNatureProgramsPanel();
          });

          birdCard.appendChild(birdImage);
          birdCard.appendChild(birdName);
          birdCard.appendChild(birdCount);
          birdGrid.appendChild(birdCard);
        });

        natureProgramsPanelContent.appendChild(questTitle);
        if (rewardLine.textContent) {
          natureProgramsPanelContent.appendChild(rewardLine);
        }
        natureProgramsPanelContent.appendChild(birdGrid);

        if (activePreviewBirdId) {
          const previewCostEntry = availableCosts.find(function (costEntry) {
            return costEntry.birdId === activePreviewBirdId;
          }) || null;

          if (previewCostEntry) {
            const previewBird = getBirdById(gameState, previewCostEntry.birdId);
            const previewLines = getReintroductionPreviewLines(previewCostEntry);
            const previewNote = document.createElement("p");
            previewNote.className = "reintroduction-preview";
            previewNote.textContent = previewBird
              ? ("Release " + previewCostEntry.amount + " " + previewBird.species + ": " + (previewLines.length > 0 ? previewLines.join(" | ") : "No passive output loss"))
              : "";
            natureProgramsPanelContent.appendChild(previewNote);
          }
        }

        if (selectedReintroductionBirdId) {
          const selectedCostEntry = availableCosts.find(function (costEntry) {
            return costEntry.birdId === selectedReintroductionBirdId;
          }) || null;

          if (selectedCostEntry) {
            const sayGoodbyeButton = document.createElement("button");
            sayGoodbyeButton.className = "menu-button";
            sayGoodbyeButton.type = "button";
            sayGoodbyeButton.dataset.requiresSuccess = "true";
            sayGoodbyeButton.textContent = "Say Goodbye";

            if (getBirdCountById(gameState, selectedCostEntry.birdId) < selectedCostEntry.amount) {
              sayGoodbyeButton.classList.add("is-locked");
            }

            sayGoodbyeButton.addEventListener("click", function () {
              if (getBirdCountById(gameState, selectedCostEntry.birdId) < selectedCostEntry.amount) {
                return;
              }

              removeBirdsFromFlock(gameState, selectedCostEntry.birdId, selectedCostEntry.amount);
              addReintroductionDietRelief(gameState, selectedCostEntry.birdId, selectedCostEntry.amount);
              gameState.feathers = (Number.isFinite(gameState.feathers) ? gameState.feathers : 0) + selectedCostEntry.amount;

              if (currentRequest.rewardItems && typeof currentRequest.rewardItems === "object") {
                Object.keys(currentRequest.rewardItems).forEach(function (itemId) {
                  addItemCount(gameState, itemId, currentRequest.rewardItems[itemId]);
                });
              }

              gameState.reintroductionQuestIndex += 1;
              selectedReintroductionBirdId = null;

              playButtonSound();
              saveGameState(gameState);
              renderTopBar(topBar, gameState);
              renderActionPanels();
            });

            natureProgramsPanelContent.appendChild(sayGoodbyeButton);
          }
        }
        return;
      } else {
        const note = document.createElement("p");
        note.className = "panel-note";
        note.textContent = "Work in Progress";
        natureProgramsPanelContent.appendChild(title);
        natureProgramsPanelContent.appendChild(note);
      }
    }

    // Refresh both right-side action panels together after state changes.
    function renderActionPanels() {
      renderTrapPanel();
      renderLoggerheadPanel();
      renderNatureProgramsPanel();
    }

    // Rebuild the left-side upgrade list from current save data.
    function renderUpgrades() {
      setActiveUpgradeCardButton();

      if (activeUpgradeCardMode !== "expand") {
        upgradesList.innerHTML = "";
        return;
      }

      upgradesList.innerHTML = "";

      if (!gameState.trapPurchased) {
        const buyTrapButton = document.createElement("button");
        buyTrapButton.className = "menu-button";
        buyTrapButton.type = "button";
        buyTrapButton.dataset.requiresSuccess = "true";
        buyTrapButton.textContent = "Buy Trap (" + formatLargeNumber(50) + " Coins)";

        buyTrapButton.addEventListener("click", function () {
          updateCoinsFromElapsedTime(gameState, Date.now());

          if (gameState.coins < 50) {
            return;
          }

          gameState.coins -= 50;
          gameState.trapPurchased = true;
          gameState.trapLoaded = false;
          gameState.trapPulled = false;
          gameState.trapBaitType = null;
          gameState.trapUsedSeedTicket = false;
          gameState.trapSpentSeedCost = 0;
          gameState.lastTrapResult = "";
          activeTrapPanelMode = "trap";
          playButtonSound();
          saveGameState(gameState);
          renderTopBar(topBar, gameState);
          renderEarthworksNav();
          renderDockyardNav();
          renderUpgrades();
          renderActionPanels();
        });

        upgradesList.appendChild(buyTrapButton);
      }

      const beddingLabel = document.createElement("p");
      beddingLabel.className = "upgrade-section-title";
      beddingLabel.textContent = "Bedding: Modifies Catch Rates";
      upgradesList.appendChild(beddingLabel);

      const beddingRow = document.createElement("div");
      beddingRow.className = "upgrade-row upgrade-row-three";
      upgradesList.appendChild(beddingRow);

      beddingRow.appendChild(createBeddingUpgradeButton({
        upgradeId: "basicBedding"
      }));
      beddingRow.appendChild(createBeddingUpgradeButton({
        upgradeId: "advancedBedding"
      }));
      beddingRow.appendChild(createBeddingUpgradeButton({
        upgradeId: "plushBedding"
      }));

      const divider = document.createElement("div");
      divider.className = "upgrade-divider";
      upgradesList.appendChild(divider);

      const storageLabel = document.createElement("p");
      storageLabel.className = "shop-count";
      storageLabel.style.textAlign = "left";
      storageLabel.textContent = "Storage: Increase Max Seeds";
      upgradesList.appendChild(storageLabel);

      const storageUpgradeRow = document.createElement("div");
      storageUpgradeRow.className = "storage-upgrade-row";
      upgradesList.appendChild(storageUpgradeRow);

      storageUpgradeRow.appendChild(createStorageUpgradeButton({
        upgradeId: "seedPouch"
      }));

      storageUpgradeRow.appendChild(createStorageUpgradeButton({
        upgradeId: "seedBank"
      }));

      const storageDivider = document.createElement("div");
      storageDivider.className = "upgrade-divider";
      upgradesList.appendChild(storageDivider);
    }

    upgradesMinimizeButton.addEventListener("click", function () {
      activeUpgradeCardMode = "minimize";
      renderUpgrades();
    });

    upgradesExpandButton.addEventListener("click", function () {
      activeUpgradeCardMode = "expand";
      renderUpgrades();
    });

    document.addEventListener("click", function () {
      document.querySelectorAll(".panel-tab-tooltip.is-open").forEach(function (openTooltip) {
        openTooltip.classList.remove("is-open");
      });
    });

    renderUpgrades();
    renderActionPanels();
  </script>
</body>
</html>
